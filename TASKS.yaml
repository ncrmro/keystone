tasks:
  - id: verify-keystone-notes-timer
    status: done
    priority: 1
    title: "Keep keystone.notes as git-backed sync only"
    summary: "Confirmed keystone.notes still defines keystone-notes-sync service and timer after removing zk scaffolding, zk options, and notes skills."
    evidence:
      - "nix build .#checks.x86_64-linux.notes-evaluation --no-link"
      - "nix-instantiate --parse modules/notes/default.nix"
    follow_up: "Do not remove keystone.notes unless a separate replacement for the git-backed notes sync timer is designed."

  - id: review-ks-legacy-removal
    status: pending
    priority: 2
    title: "Validate deletion of packages/ks-legacy"
    summary: "The dirty tree deletes packages/ks-legacy and ks legacy module tests. Assess whether all legacy shell commands have Rust ks replacements before committing."
    files:
      - "packages/ks-legacy/"
      - "tests/module/ks-doctor-report.nix"
      - "tests/module/ks-lock-sync.nix"
      - "flake.nix"
    checks:
      - "Search for remaining package exports or references to ks-legacy."
      - "Confirm docs, print, lock-sync, doctor-report, and compatibility shims are covered by Rust ks or intentionally removed."
      - "Run the relevant ks Rust tests and flake checks after the commit is isolated."

