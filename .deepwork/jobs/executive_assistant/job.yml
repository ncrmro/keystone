name: executive_assistant
version: "1.5.1"
summary: "Executive assistant workflows: event planning, calendar management, inbox cleanup, event discovery, presentation creation, and zk-backed task coordination"
common_job_info_provided_to_all_steps_at_runtime: |
  Executive assistant workflows for the human operator. These workflows handle
  common administrative and strategic tasks that support the CEO's productivity.

  Tools available:
  - Email: Use the himalaya CLI for reading, sending, and managing email
  - Calendar: Check for calendar tools or integrations available in the environment
  - Web search: Use WebSearch and WebFetch for research tasks
  - File management: Standard file tools for creating reports and plans
  - zk notes: Use `zk --notebook-dir <path>` for note discovery, creation, linking, and indexing
  - Zellij fleet survey: Use `zellij list-sessions` and `zellij --session <name> action dump-screen <path>` to inspect live agent activity. See task_loop_collect_agent_activity.md for the full pattern.

  Conventions:
  - Always act on behalf of the human operator (see TEAM.md for identity)
  - Draft communications for review before sending — never send without confirmation
  - Use plain, professional language in all written outputs
  - Include actionable next steps in every deliverable
  - Reference specific dates, times, and contacts where possible
  - Prefer active project hub notes in `index/` as the source of truth for project scope
  - For task coordination, create and update zk notes in notes repos instead of writing to legacy TASKS.yaml ledgers
  - Keep tags within approved namespaces (`project/*`, `repo/*`, `status/*`, `source/*`); store milestone, issue, PR, assignee, and owner references in frontmatter

  Task note frontmatter contract (see steps/shared/task_note_frontmatter.md for full examples):
  - Required baseline fields: `id`, `title`, `type`, `created`, `author`, `tags`
  - Coordination fields (add when known): `project`, `owner`, `status`, `assigned_agent`,
    `milestone_ref`, `issue_ref`, `pr_ref`, `repo_ref`, `source_ref`, `next_review`, `coordination_note`
  - Use the same `source_ref` for deduplication across the human note and all owner mirrors
  - Do not invent tag namespaces for milestone, issue, PR, or assignee identity

  Output audience: The human operator (CEO). Keep outputs concise and decision-ready.

  ## Portfolio review

  The portfolio_review workflow performs a holistic review of the user's entire project portfolio.
  It replaces per-project status.md files with a single comprehensive report covering all active projects.

  Data sources per project:
  - GitHub/Forgejo milestones — open milestones, issue counts, completion percentages
  - Git log — recent commit activity to gauge momentum (last 30 days)
  - Existing project profiles — charter.md, README.yaml, status.md from notes repo's `projects/{slug}/`

  Projects are discovered from `projects/README.md` (primary) or `PROJECTS.yaml` at the notes repo root.

  Platform tools:
  - GitHub repos: `gh` CLI for milestones, issues, PRs, and activity
  - Forgejo repos: `fj` or `tea` CLI, or `curl` with Forgejo API
  - Git activity: `git log --oneline --since="30 days ago"` on local clones in `~/code/ncrmro/`

  The final report is delivered as a pull request into the notes repo at:
  `projects/portfolio/reviews/YYYY-MM.md` (dated, accumulates over time).
  Branch naming: `portfolio-review/YYYY-MM`. PRs are created with `gh pr merge --auto --squash`
  enabled (72-hour review window before auto-merge).

  Status indicators: 🟢 On Track, 🟡 At Risk, 🔴 Behind, ⚪ Not Started/Deferred

workflows:
  - name: plan_event
    summary: "Plan an event end-to-end: venue ideas, agenda, invitations, logistics"
    steps:
      - event_gather_requirements
      - event_research_options
      - event_draft_plan
      - event_finalize_plan

  - name: manage_calendar
    summary: "Review calendar, resolve conflicts, update entries, and send invitations"
    steps:
      - calendar_review
      - calendar_identify_conflicts
      - calendar_update_and_invite
      - calendar_confirm

  - name: clean_inbox
    summary: "Review inbox, categorize messages, draft replies, and archive clutter"
    steps:
      - inbox_fetch_messages
      - inbox_categorize_messages
      - inbox_draft_responses
      - inbox_apply_actions

  - name: discover_events
    summary: "Find events relevant to the human's projects and interests"
    steps:
      - discover_gather_interests
      - discover_search_events
      - discover_rank_and_filter
      - discover_present_recommendations

  - name: task_loop
    summary: "Review calendar, active work, agent assignments, and milestone state; update zk notes; publish next actions"
    steps:
      - task_loop_discover_notes_repos
      - task_loop_review_calendar_context
      - task_loop_collect_active_task_notes
      - task_loop_collect_agent_activity
      - task_loop_synthesize_daily_priorities
      - task_loop_rollover_daily_note
      - task_loop_sync_owner_notes
      - task_loop_publish_next_actions

  - name: portfolio_review
    summary: "Full portfolio review across all active projects with synthesized health report and Eisenhower matrix"
    steps:
      - portfolio_discover_projects
      - portfolio_review_all_projects
      - portfolio_synthesize_report

  - name: portfolio_review_one
    summary: "Status review for a single project: milestones, activity, and health assessment"
    steps:
      - portfolio_gather_data
      - portfolio_write_summary

  - name: slide_deck
    summary: "Build and review a Slidev presentation deck from outline or presentation content (legacy — prefer presentation workflow)"
    steps:
      - slide_gather_content
      - slide_build_deck
      - slide_review_deck
      - slide_deliver

  - name: presentation
    summary: "End-to-end presentation creation: requirements, Immich media search, outline, Slidev deck, speaker notes, and delivery to notes repo"
    steps:
      - presentation_gather_requirements
      - presentation_search_media
      - presentation_outline
      - presentation_build_deck
      - presentation_review_deck
      - presentation_deliver

steps:
  # ── plan_event workflow ──────────────────────────────────────────────

  - id: event_gather_requirements
    name: "Gather Event Requirements"
    description: "Collect event details: purpose, date range, attendee count, budget, preferences"
    instructions_file: steps/event_gather_requirements.md
    inputs:
      - name: event_description
        description: "What is the event? (e.g., team offsite, product launch dinner, investor meeting)"
      - name: date_range
        description: "Preferred date range for the event"
      - name: attendee_count
        description: "Expected number of attendees"
      - name: budget
        description: "Budget range for the event (e.g., $500-$1000)"
    outputs:
      event_requirements.md:
        type: file
        description: "Structured requirements document with all event parameters"
        required: true
    dependencies: []
    reviews: []

  - id: event_research_options
    name: "Research Event Options"
    description: "Research venues, catering, and logistics options matching requirements"
    instructions_file: steps/event_research_options.md
    inputs:
      - file: event_requirements.md
        from_step: event_gather_requirements
    outputs:
      event_options.md:
        type: file
        description: "Researched options for venues, catering, and logistics with pros/cons"
        required: true
    dependencies:
      - event_gather_requirements
    reviews:
      - run_each: event_options.md
        additional_review_guidance: "Read event_requirements.md to verify options match the stated requirements and budget."
        quality_criteria:
          "Requirements Match": "All options fall within the stated budget and date range."
          "Actionable Options": "Each option includes enough detail (name, cost estimate, capacity) to make a decision."

  - id: event_draft_plan
    name: "Draft Event Plan"
    description: "Create a comprehensive event plan with agenda, logistics, and invitation list"
    instructions_file: steps/event_draft_plan.md
    inputs:
      - file: event_requirements.md
        from_step: event_gather_requirements
      - file: event_options.md
        from_step: event_research_options
    outputs:
      event_plan.md:
        type: file
        description: "Complete event plan with agenda, venue selection, logistics, and draft invitations"
        required: true
    dependencies:
      - event_gather_requirements
      - event_research_options
    reviews:
      - run_each: event_plan.md
        additional_review_guidance: "Read event_requirements.md and event_options.md to verify the plan is consistent with requirements and chosen options."
        quality_criteria:
          "Complete Plan": "The plan covers venue, agenda, catering, and logistics."
          "Timeline Included": "A clear timeline of tasks and deadlines is present."
          "Invitation Ready": "Draft invitation text is included and ready to customize."

  - id: event_finalize_plan
    name: "Finalize Event Plan"
    description: "Review plan with user, incorporate feedback, and produce final deliverable"
    instructions_file: steps/event_finalize_plan.md
    inputs:
      - file: event_plan.md
        from_step: event_draft_plan
    outputs:
      final_event_plan.md:
        type: file
        description: "Final approved event plan ready for execution"
        required: true
    dependencies:
      - event_draft_plan
    reviews:
      - run_each: final_event_plan.md
        quality_criteria:
          "Decision Ready": "The plan contains clear decisions (not options) for every logistics item."
          "Actionable Checklist": "A checklist of next actions with owners and deadlines is included."

  # ── manage_calendar workflow ─────────────────────────────────────────

  - id: calendar_review
    name: "Review Calendar"
    description: "Fetch and review calendar entries for the specified time range"
    instructions_file: steps/calendar_review.md
    inputs:
      - name: time_range
        description: "Time range to review (e.g., 'this week', 'next 2 weeks', 'March 2026')"
      - name: calendar_source
        description: "Calendar source or account to review"
    outputs:
      calendar_snapshot.md:
        type: file
        description: "Current calendar state with all entries in the time range"
        required: true
    dependencies: []
    reviews: []

  - id: calendar_identify_conflicts
    name: "Identify Conflicts"
    description: "Analyze calendar for conflicts, gaps, and optimization opportunities"
    instructions_file: steps/calendar_identify_conflicts.md
    inputs:
      - file: calendar_snapshot.md
        from_step: calendar_review
    outputs:
      calendar_analysis.md:
        type: file
        description: "Analysis of conflicts, double-bookings, gaps, and suggested changes"
        required: true
    dependencies:
      - calendar_review
    reviews:
      - run_each: calendar_analysis.md
        additional_review_guidance: "Read calendar_snapshot.md to verify that identified conflicts are real and suggestions are reasonable."
        quality_criteria:
          "Accurate Conflicts": "All identified conflicts correspond to actual overlapping entries."
          "Practical Suggestions": "Suggested resolutions are specific and actionable."

  - id: calendar_update_and_invite
    name: "Update and Invite"
    description: "Apply calendar changes and send meeting invitations"
    instructions_file: steps/calendar_update_and_invite.md
    inputs:
      - file: calendar_analysis.md
        from_step: calendar_identify_conflicts
    outputs:
      calendar_changes.md:
        type: file
        description: "Log of changes made and invitations sent"
        required: true
    dependencies:
      - calendar_identify_conflicts
    reviews:
      - run_each: calendar_changes.md
        additional_review_guidance: "Read calendar_analysis.md to verify that only the suggested changes were applied and no unintended modifications were made."
        quality_criteria:
          "Changes Match Plan": "Every change logged corresponds to a suggestion from the calendar analysis."
          "Invitations Confirmed": "All invitations sent are logged with recipient and confirmation status."
          "No Unintended Side Effects": "No calendar entries were modified or deleted beyond what was planned."

  - id: calendar_confirm
    name: "Confirm Calendar"
    description: "Verify all changes applied correctly and summarize final state"
    instructions_file: steps/calendar_confirm.md
    inputs:
      - file: calendar_changes.md
        from_step: calendar_update_and_invite
    outputs:
      calendar_summary.md:
        type: file
        description: "Final calendar summary confirming all changes are in place"
        required: true
    dependencies:
      - calendar_update_and_invite
    reviews:
      - run_each: calendar_summary.md
        quality_criteria:
          "Changes Verified": "All planned changes from the analysis are accounted for."
          "Clear Summary": "The summary gives a clear picture of the calendar's final state."

  # ── clean_inbox workflow ─────────────────────────────────────────────

  - id: inbox_fetch_messages
    name: "Fetch Messages"
    description: "Retrieve messages from the inbox for the specified time range"
    instructions_file: steps/inbox_fetch_messages.md
    inputs:
      - name: inbox_account
        description: "Email account to clean (e.g., luce@ncrmro.com)"
      - name: time_range
        description: "Time range to review (e.g., 'last 7 days', 'today', 'unread')"
      - name: priority_rules
        description: "Priority rules (e.g., 'flag anything from investors, archive newsletters')"
    outputs:
      inbox_snapshot.md:
        type: file
        description: "List of messages with sender, subject, date, and preview"
        required: true
    dependencies: []
    reviews: []

  - id: inbox_categorize_messages
    name: "Categorize Messages"
    description: "Sort messages into categories: urgent, needs reply, FYI, archive, delete"
    instructions_file: steps/inbox_categorize_messages.md
    inputs:
      - file: inbox_snapshot.md
        from_step: inbox_fetch_messages
    outputs:
      categorized_inbox.md:
        type: file
        description: "Messages categorized by priority and action needed"
        required: true
    dependencies:
      - inbox_fetch_messages
    reviews:
      - run_each: categorized_inbox.md
        additional_review_guidance: "Read inbox_snapshot.md and check that the priority_rules input was respected in categorization."
        quality_criteria:
          "Complete Coverage": "Every message from the snapshot is categorized."
          "Priority Rules Applied": "The user's priority rules are reflected in the categorization."

  - id: inbox_draft_responses
    name: "Draft Responses"
    description: "Draft replies for messages that need a response"
    instructions_file: steps/inbox_draft_responses.md
    inputs:
      - file: categorized_inbox.md
        from_step: inbox_categorize_messages
    outputs:
      draft_replies.md:
        type: file
        description: "Draft replies for messages flagged as needing a response"
        required: true
    dependencies:
      - inbox_categorize_messages
    reviews:
      - run_each: draft_replies.md
        quality_criteria:
          "Professional Tone": "All drafts use professional, concise language appropriate for the recipient."
          "Actionable Content": "Each draft addresses the sender's question or request with a clear next step."

  - id: inbox_apply_actions
    name: "Apply Inbox Actions"
    description: "Execute categorized actions: send replies, archive, delete, flag"
    instructions_file: steps/inbox_apply_actions.md
    inputs:
      - file: categorized_inbox.md
        from_step: inbox_categorize_messages
      - file: draft_replies.md
        from_step: inbox_draft_responses
    outputs:
      inbox_actions_log.md:
        type: file
        description: "Log of all actions taken on inbox messages"
        required: true
    dependencies:
      - inbox_categorize_messages
      - inbox_draft_responses
    reviews:
      - run_each: inbox_actions_log.md
        quality_criteria:
          "Actions Logged": "Every action taken is logged with message ID and result."
          "No Unintended Deletions": "Only messages categorized as delete were deleted; important messages were preserved."

  # ── discover_events workflow ─────────────────────────────────────────

  - id: discover_gather_interests
    name: "Gather Interests"
    description: "Identify the human's interests, projects, and event preferences"
    instructions_file: steps/discover_gather_interests.md
    inputs:
      - name: interest_areas
        description: "Areas of interest (e.g., 'AI/ML, startups, Nix/NixOS, Rust')"
      - name: location
        description: "Location or region for events (e.g., 'Austin TX', 'remote', 'US')"
      - name: date_range
        description: "Date range to search (e.g., 'next 3 months', 'April 2026')"
    outputs:
      interest_profile.md:
        type: file
        description: "Structured profile of interests, projects, and event preferences"
        required: true
    dependencies: []
    reviews: []

  - id: discover_search_events
    name: "Search Events"
    description: "Search for events matching the interest profile"
    instructions_file: steps/discover_search_events.md
    inputs:
      - file: interest_profile.md
        from_step: discover_gather_interests
    outputs:
      event_candidates.md:
        type: file
        description: "Raw list of discovered events with details"
        required: true
    dependencies:
      - discover_gather_interests
    reviews:
      - run_each: event_candidates.md
        additional_review_guidance: "Read interest_profile.md to verify events are relevant to the stated interests and location."
        quality_criteria:
          "Relevance": "All listed events are plausibly relevant to at least one stated interest area."
          "Complete Details": "Each event includes name, date, location, URL, and brief description."

  - id: discover_rank_and_filter
    name: "Rank and Filter"
    description: "Score and rank events by relevance, filter out low-value ones"
    instructions_file: steps/discover_rank_and_filter.md
    inputs:
      - file: interest_profile.md
        from_step: discover_gather_interests
      - file: event_candidates.md
        from_step: discover_search_events
    outputs:
      ranked_events.md:
        type: file
        description: "Events ranked by relevance with scores and rationale"
        required: true
    dependencies:
      - discover_gather_interests
      - discover_search_events
    reviews:
      - run_each: ranked_events.md
        additional_review_guidance: "Read interest_profile.md and event_candidates.md to verify scoring rationale aligns with stated interests."
        quality_criteria:
          "Scoring Rationale": "Each event has a clear score and rationale tied to specific interest areas."
          "Filter Logic": "Low-relevance events are excluded with brief justification."

  - id: discover_present_recommendations
    name: "Present Recommendations"
    description: "Create a polished recommendations document with top events"
    instructions_file: steps/discover_present_recommendations.md
    inputs:
      - file: ranked_events.md
        from_step: discover_rank_and_filter
    outputs:
      event_recommendations.md:
        type: file
        description: "Final curated list of recommended events with action items"
        required: true
    dependencies:
      - discover_rank_and_filter
    reviews:
      - run_each: event_recommendations.md
        quality_criteria:
          "Decision Ready": "Each recommendation includes enough information to decide whether to attend."
          "Clear Value Proposition": "For each event, the reason it matters to the human's goals is stated."
          "Actionable": "Registration links or next steps are included for each recommended event."

  # ── task_loop workflow ───────────────────────────────────────────────

  - id: task_loop_discover_notes_repos
    name: "Discover Notes Repos"
    description: "Find the human and agent notes repos under the keystone owner layout and establish the working date"
    instructions_file: steps/task_loop_discover_notes_repos.md
    inputs:
      - name: notes_root
        description: "Root directory containing owner repos (default: ~/.keystone/repos)"
      - name: human_owner
        description: "Owner slug for the human operator's notes repo (default: ncrmro)"
      - name: owner_filter
        description: "Optional comma-separated owner list to limit sync targets"
      - name: target_date
        description: "Optional ISO date to replay the workflow for a specific day"
    outputs:
      notes_repo_inventory.md:
        type: file
        description: "Discovered notes repos, owner roles, working date, and any missing repos"
        required: true
    dependencies: []
    reviews:
      - run_each: notes_repo_inventory.md
        quality_criteria:
          "Working Date Established": "The inventory records one working date and one human owner."
          "Repo Coverage": "Each discovered owner repo includes an absolute notes path and existence status."

  - id: task_loop_review_calendar_context
    name: "Review Calendar Context"
    description: "Gather calendar events and timing pressure that should influence today's priorities"
    instructions_file: steps/task_loop_review_calendar_context.md
    inputs:
      - file: notes_repo_inventory.md
        from_step: task_loop_discover_notes_repos
      - name: calendar_source
        description: "Calendar account or command source to inspect"
      - name: focus_window
        description: "Near-term horizon to prioritize, such as 'today' or 'next 48 hours'"
    outputs:
      calendar_context.md:
        type: file
        description: "Calendar-critical events, deadlines, and task implications for the working date"
        required: true
    dependencies:
      - task_loop_discover_notes_repos
    reviews:
      - run_each: calendar_context.md
        quality_criteria:
          "Absolute Dates": "The report uses specific dates and times for every event it cites."
          "Priority Signal": "Each calendar item states whether it should promote, defer, or monitor related work."

  - id: task_loop_collect_active_task_notes
    name: "Collect Active Task Notes"
    description: "Discover existing zk task notes, project hubs, and shared-surface references relevant to active work"
    instructions_file: steps/task_loop_collect_active_task_notes.md
    inputs:
      - file: notes_repo_inventory.md
        from_step: task_loop_discover_notes_repos
      - file: calendar_context.md
        from_step: task_loop_review_calendar_context
    outputs:
      active_task_notes.md:
        type: file
        description: "Inventory of active task notes, linked projects, milestones, issues, and pull requests"
        required: true
    dependencies:
      - task_loop_discover_notes_repos
      - task_loop_review_calendar_context
    reviews:
      - run_each: active_task_notes.md
        quality_criteria:
          "zk First": "Task discovery is grounded in zk notes and active project hubs, not legacy YAML task ledgers."
          "Shared Surface Captured": "Each tracked task records available project, repo, milestone, issue, and PR references."

  - id: task_loop_collect_agent_activity
    name: "Collect Agent Activity"
    description: "Summarize assigned agent work, mirrored notes, and active-session context across owner repos"
    instructions_file: steps/task_loop_collect_agent_activity.md
    inputs:
      - file: notes_repo_inventory.md
        from_step: task_loop_discover_notes_repos
      - file: active_task_notes.md
        from_step: task_loop_collect_active_task_notes
    outputs:
      agent_activity.md:
        type: file
        description: "Current agent assignments, note mirrors, recent progress, and blockers"
        required: true
    dependencies:
      - task_loop_discover_notes_repos
      - task_loop_collect_active_task_notes
    reviews:
      - run_each: agent_activity.md
        quality_criteria:
          "Assignment Coverage": "Each active agent owner has either current assignments or an explicit 'none' status."
          "Cross-Repo Awareness": "Mirrored task-note state between the human repo and agent repos is described accurately."

  - id: task_loop_synthesize_daily_priorities
    name: "Synthesize Daily Priorities"
    description: "Combine calendar pressure, task notes, and agent activity into one ranked action plan with Eisenhower matrix"
    instructions_file: steps/task_loop_synthesize_daily_priorities.md
    inputs:
      - file: calendar_context.md
        from_step: task_loop_review_calendar_context
      - file: active_task_notes.md
        from_step: task_loop_collect_active_task_notes
      - file: agent_activity.md
        from_step: task_loop_collect_agent_activity
    outputs:
      daily_priorities.md:
        type: file
        description: "Eisenhower-matrix priorities with ranked next actions and explicit Q4 disposal plan"
        required: true
    dependencies:
      - task_loop_review_calendar_context
      - task_loop_collect_active_task_notes
      - task_loop_collect_agent_activity
    reviews:
      - run_each: daily_priorities.md
        quality_criteria:
          "Calendar First": "Calendar-critical items outrank backlog work when they conflict."
          "Explicit Next Actions": "Every priority entry has an owner, a concrete next action, and a reason for its rank."
          "Eisenhower Matrix Present": "The output contains a 2x2 matrix mapping active work to Q1/Q2/Q3/Q4 quadrants."
          "Q4 Disposal Actions": "Every Q4 item has an explicit disposal action: defer, delegate, icebox, or delete."

  - id: task_loop_rollover_daily_note
    name: "Rollover Daily Note"
    description: "Create or update the executive-assistant daily note and carry unfinished work forward by link"
    instructions_file: steps/task_loop_rollover_daily_note.md
    inputs:
      - file: notes_repo_inventory.md
        from_step: task_loop_discover_notes_repos
      - file: daily_priorities.md
        from_step: task_loop_synthesize_daily_priorities
    outputs:
      executive_assistant_daily.md:
        type: file
        description: "The dated executive-assistant daily note with priorities, delegation, blockers, and carry-forward links"
        required: true
    dependencies:
      - task_loop_discover_notes_repos
      - task_loop_synthesize_daily_priorities
    reviews:
      - run_each: executive_assistant_daily.md
        quality_criteria:
          "Single Daily Note": "The output identifies exactly one daily note for the working date."
          "Carry Forward By Link": "Unfinished work is carried forward by linking existing task notes instead of duplicating content."

  - id: task_loop_sync_owner_notes
    name: "Sync Owner Notes"
    description: "Mirror assigned task state into owner notes repos while preserving the human daily note as the coordination source"
    instructions_file: steps/task_loop_sync_owner_notes.md
    inputs:
      - file: notes_repo_inventory.md
        from_step: task_loop_discover_notes_repos
      - file: daily_priorities.md
        from_step: task_loop_synthesize_daily_priorities
      - file: executive_assistant_daily.md
        from_step: task_loop_rollover_daily_note
    outputs:
      owner_sync_log.md:
        type: file
        description: "Per-owner sync actions, mirrored notes updated, and any skipped repos or conflicts"
        required: true
    dependencies:
      - task_loop_discover_notes_repos
      - task_loop_synthesize_daily_priorities
      - task_loop_rollover_daily_note
    reviews:
      - run_each: owner_sync_log.md
        quality_criteria:
          "Human Repo Canonical": "The log treats the human notes repo as the coordination source of truth."
          "Scoped Mirrors": "Agent repos receive only assigned-work mirrors plus backlinks to the human daily note."

  - id: task_loop_publish_next_actions
    name: "Publish Next Actions"
    description: "Produce the final operator-facing summary and identify what the workflow updated"
    instructions_file: steps/task_loop_publish_next_actions.md
    inputs:
      - file: daily_priorities.md
        from_step: task_loop_synthesize_daily_priorities
      - file: executive_assistant_daily.md
        from_step: task_loop_rollover_daily_note
      - file: owner_sync_log.md
        from_step: task_loop_sync_owner_notes
    outputs:
      task_loop_summary.md:
        type: file
        description: "Final summary with today's priorities, delegated work, blockers, and note paths"
        required: true
    dependencies:
      - task_loop_synthesize_daily_priorities
      - task_loop_rollover_daily_note
      - task_loop_sync_owner_notes
    reviews:
      - run_each: task_loop_summary.md
        quality_criteria:
          "Decision Ready": "The summary gives the operator a short, concrete list of what to do now, what is delegated, and what is blocked."
          "Paths Included": "The summary names the updated daily note and any mirrored owner notes."
          "Do Now Has Owner and Time": "Each item in the Do Now list names an explicit owner and a specific deadline or time reference."

  # ── portfolio_review workflow ────────────────────────────────────────

  - id: portfolio_discover_projects
    name: "Discover Projects"
    description: "Scan the notes repo to build a list of all active projects with their repos and platforms"
    instructions_file: steps/portfolio_discover_projects.md
    inputs:
      - name: notes_path
        description: "Path to the notes repo (e.g., ~/code/ncrmro/obsidian or ~/notes)"
    outputs:
      project_list.md:
        type: file
        description: "Structured list of all active projects with name, slug, repos (owner/repo), platform (github/forgejo), and local clone paths"
        required: true
    dependencies: []
    reviews:
      - run_each: project_list.md
        quality_criteria:
          "All Active Projects Listed": "Every active project from the notes repo is included with at least one repo reference."
          "Platform Identified": "Each repo entry specifies whether it is on GitHub or Forgejo."
          "Archived Excluded": "Archived or inactive projects are excluded from the list or clearly marked as excluded."

  - id: portfolio_review_all_projects
    name: "Review All Projects"
    description: "Launch portfolio_review_one sub-workflow for each project in parallel via sub-agents"
    instructions_file: steps/portfolio_review_all_projects.md
    inputs:
      - file: project_list.md
        from_step: portfolio_discover_projects
    outputs:
      all_summaries.md:
        type: file
        description: "Combined per-project status summaries collected from all sub-workflow runs"
        required: true
    dependencies:
      - portfolio_discover_projects
    reviews:
      - run_each: all_summaries.md
        additional_review_guidance: "Read project_list.md to verify every active project from the list has a corresponding summary."
        quality_criteria:
          "Full Coverage": "Every active project from project_list.md has a status summary in the combined output."
          "Consistent Format": "All per-project summaries follow the same structure (status, milestones, activity, blockers)."

  - id: portfolio_synthesize_report
    name: "Synthesize Portfolio Report"
    description: "Combine all per-project summaries into a single portfolio health report with cross-project analysis"
    instructions_file: steps/portfolio_synthesize_report.md
    inputs:
      - file: all_summaries.md
        from_step: portfolio_review_all_projects
      - file: project_list.md
        from_step: portfolio_discover_projects
    outputs:
      portfolio_report.md:
        type: file
        description: "The final portfolio review report written to projects/portfolio/reviews/YYYY-MM.md in the notes repo"
        required: true
    dependencies:
      - portfolio_review_all_projects
      - portfolio_discover_projects
    reviews:
      - run_each: portfolio_report.md
        additional_review_guidance: "Read all_summaries.md to verify the report accurately reflects the per-project data without fabrication."
        quality_criteria:
          "Portfolio Summary Present": "The report opens with an overall portfolio health assessment and project count."
          "Per-Project Table": "A summary table lists every project with status indicator, active milestone, and activity level."
          "Milestone Detail": "All open milestones across projects are listed with completion percentages and target dates."
          "Cross-Project Analysis": "The report identifies cross-project blockers, resource conflicts, or dependencies."
          "Priority Recommendations": "Actionable recommendations for where to focus next are included, ordered by impact."
          "Eisenhower Matrices": "A portfolio-level Eisenhower matrix classifies all projects into 4 quadrants (urgent/important). Projects with 2+ milestones also have a per-project matrix."
          "Data-Backed": "All status indicators and assessments cite specific data (commit counts, issue counts, dates) rather than vague assertions."

  # ── portfolio_review_one workflow (sub-workflow, per project) ────────

  - id: portfolio_gather_data
    name: "Gather Project Data"
    description: "Fetch milestones, git activity, and existing profile/charter data for a single project"
    instructions_file: steps/portfolio_gather_data.md
    inputs:
      - name: project_slug
        description: "The project slug (e.g., 'keystone', 'catalyst', 'meze')"
      - name: project_repos
        description: "Comma-separated list of repos as owner/repo:platform (e.g., 'ncrmro/keystone:github,ncrmro/keystone:forgejo')"
      - name: notes_path
        description: "Path to the notes repo for reading existing project profile/charter files"
    outputs:
      project_data.md:
        type: file
        description: "Raw collected data: milestone list with issue counts, recent git commits, charter/profile excerpts"
        required: true
    dependencies: []
    reviews: []

  - id: portfolio_write_summary
    name: "Write Project Summary"
    description: "Synthesize raw data into a formatted per-project status summary"
    instructions_file: steps/portfolio_write_summary.md
    inputs:
      - file: project_data.md
        from_step: portfolio_gather_data
    outputs:
      project_summary.md:
        type: file
        description: "Formatted status summary: status indicator, goals, milestones, recent activity, blockers, next actions"
        required: true
    dependencies:
      - portfolio_gather_data
    reviews:
      - run_each: project_summary.md
        additional_review_guidance: "Read project_data.md to verify the summary accurately reflects the raw data."
        quality_criteria:
          "Status Justified": "The status indicator (on-track/at-risk/behind/deferred) is justified by specific data points."
          "Milestones Covered": "All open milestones are listed with completion percentage and target date if available."
          "Activity Assessed": "Recent activity (commits, PRs, issues) is summarized to show momentum or stagnation."
          "Actionable": "Next actions are concrete and specific, not vague aspirations."

  # ── slide_deck workflow ──────────────────────────────────────────────

  - id: slide_gather_content
    name: "Gather Presentation Content"
    description: "Collect and structure the presentation content — from a prior presentation workflow output, a notes file, or direct user input"
    instructions_file: steps/slide_gather_content.md
    inputs:
      - name: presentation_source
        description: "Source of presentation content: a file path (e.g., presentation_outline.md from the presentation workflow), a topic/goal string, or 'ask' to prompt for it interactively"
      - name: audience
        description: "Target audience for the presentation (e.g., 'investors', 'engineering team', 'conference attendees')"
      - name: duration_minutes
        description: "Target presentation duration in minutes (used to calibrate slide count)"
      - name: output_dir
        description: "Directory where the Slidev project will be created (default: ./slide-deck)"
    outputs:
      slide_content_plan.md:
        type: file
        description: "Structured slide-by-slide content plan: title, key points, speaker notes, and layout hints for each slide"
        required: true
    dependencies: []
    reviews:
      - run_each: slide_content_plan.md
        quality_criteria:
          "Slide Count Calibrated": "The number of slides is proportional to the target duration (roughly 1–2 minutes per slide)."
          "Clear Narrative Arc": "Slides follow a coherent story: opening hook, body, and closing call-to-action or summary."
          "Audience Appropriate": "Content depth and vocabulary match the stated audience."
          "Speaker Notes Present": "Every slide has speaker notes summarizing what to say."

  - id: slide_build_deck
    name: "Build Slidev Deck"
    description: "Scaffold the Slidev project and write the complete presentation in Slidev markdown format"
    instructions_file: steps/slide_build_deck.md
    inputs:
      - file: slide_content_plan.md
        from_step: slide_gather_content
    outputs:
      slides_md_path.txt:
        type: file
        description: "Path to the generated slides.md file (the Slidev entry point)"
        required: true
    dependencies:
      - slide_gather_content
    reviews:
      - run_each: slides_md_path.txt
        additional_review_guidance: "Read the slides.md at the path in slides_md_path.txt to verify structure and content."
        quality_criteria:
          "Valid Slidev Markdown": "The file uses correct Slidev frontmatter and --- slide separators with no syntax errors."
          "All Slides Present": "Every slide from slide_content_plan.md is represented in the deck."
          "Layouts Used": "Slides use appropriate Slidev layouts (cover, center, two-cols, etc.) rather than blank defaults throughout."
          "Speaker Notes Included": "Each slide has a <!-- --> or notes: block with speaker guidance."

  - id: slide_review_deck
    name: "Review Deck"
    description: "Run a structured review of the deck: content quality, slide flow, visual consistency, and presenter readiness"
    instructions_file: steps/slide_review_deck.md
    inputs:
      - file: slide_content_plan.md
        from_step: slide_gather_content
      - file: slides_md_path.txt
        from_step: slide_build_deck
    outputs:
      slide_review_report.md:
        type: file
        description: "Review findings: issues per slide, overall narrative assessment, and list of recommended edits"
        required: true
      slides_revised_path.txt:
        type: file
        description: "Path to the revised slides.md after applying review fixes (may equal slides_md_path.txt if no changes were needed)"
        required: true
    dependencies:
      - slide_gather_content
      - slide_build_deck
    reviews:
      - run_each: slide_review_report.md
        quality_criteria:
          "Per-Slide Coverage": "The report addresses every slide by number, even if just 'no issues'."
          "Actionable Findings": "Each issue includes the slide number, the problem, and the specific fix applied."
          "Narrative Verdict": "The report includes an overall narrative verdict: does the deck tell a clear story?"
          "Revision Applied": "All identified issues are fixed in the revised slides.md before this step completes."

  - id: slide_deliver
    name: "Deliver Deck"
    description: "Verify the deck builds cleanly with Slidev, produce export artifacts, and hand off to the operator"
    instructions_file: steps/slide_deliver.md
    inputs:
      - file: slides_revised_path.txt
        from_step: slide_review_deck
    outputs:
      slide_delivery_summary.md:
        type: file
        description: "Delivery summary: deck location, slide count, how to serve/export, and any remaining open items"
        required: true
    dependencies:
      - slide_review_deck
    reviews:
      - run_each: slide_delivery_summary.md
        quality_criteria:
          "Build Verified": "The summary confirms `slidev build` (or `slidev export`) completed without errors."
          "Serve Command Included": "The summary shows the exact command to preview the deck locally."
          "Slide Count Confirmed": "The final slide count matches the planned count from slide_content_plan.md."
          "Open Items Noted": "Any remaining TODOs (missing images, placeholder text, pending decisions) are listed."

  # ── presentation workflow ────────────────────────────────────────────

  - id: presentation_gather_requirements
    name: "Gather Presentation Requirements"
    description: "Interactively collect topic, audience, key messages, duration, tone, and media preferences. Ask the user whether to search Immich for photos, screenshots, or videos."
    instructions_file: steps/presentation_gather_requirements.md
    inputs:
      - name: topic
        description: "What is the presentation about? Provide a title or short description."
      - name: audience
        description: "Who is the audience? (e.g., investors, engineering team, conference attendees)"
      - name: duration_minutes
        description: "Target presentation duration in minutes (used to calibrate slide count)"
    outputs:
      presentation_requirements.md:
        type: file
        description: "Structured requirements: topic, audience, key messages, tone, duration, desired slide count, and confirmed media preferences (whether to search Immich and what to look for)"
        required: true
    dependencies: []
    reviews:
      - run_each: presentation_requirements.md
        quality_criteria:
          "Key Messages Captured": "At least 3 key messages or talking points are listed."
          "Media Preferences Confirmed": "The document states whether Immich media search is desired and, if so, what types of media to find (photos, screenshots, by topic/location/date/people)."
          "Slide Count Target": "A target slide count is calculated from the duration (roughly 1–2 minutes per slide)."

  - id: presentation_search_media
    name: "Search Media in Immich"
    description: "Query the Immich API to find photos, videos, and OCR-indexed screenshots relevant to the presentation topic. Produce a media manifest with file paths and captions."
    instructions_file: steps/presentation_search_media.md
    inputs:
      - file: presentation_requirements.md
        from_step: presentation_gather_requirements
    outputs:
      presentation_media_manifest.md:
        type: file
        description: "List of selected media assets: Immich asset ID, local download path (under presentations/_dataroom/), suggested slide placement, and caption hint. Includes a 'no media' entry if the user opted out of media search."
        required: true
    dependencies:
      - presentation_gather_requirements
    reviews:
      - run_each: presentation_media_manifest.md
        additional_review_guidance: "Read presentation_requirements.md to verify the media matches the stated topic, audience, and any specified location/date/people filters."
        quality_criteria:
          "Relevant Assets": "Each asset is plausibly relevant to the presentation topic or key messages."
          "Paths Valid": "Every listed asset has a local path under presentations/_dataroom/ or is marked as a TODO for manual download."
          "Slide Placement Suggested": "Each asset has a suggested slide or section where it could appear."

  - id: presentation_outline
    name: "Create Presentation Outline"
    description: "Build a slide-by-slide outline with titles, key points, speaker notes, and media placement. Insert TODO comments for any media slots not yet resolved."
    instructions_file: steps/presentation_outline.md
    inputs:
      - file: presentation_requirements.md
        from_step: presentation_gather_requirements
      - file: presentation_media_manifest.md
        from_step: presentation_search_media
    outputs:
      presentation_outline.md:
        type: file
        description: "Slide-by-slide outline: slide number, title, bullet points, speaker notes, and media reference (asset path or TODO placeholder). Follows a clear narrative arc."
        required: true
    dependencies:
      - presentation_gather_requirements
      - presentation_search_media
    reviews:
      - run_each: presentation_outline.md
        additional_review_guidance: "Read presentation_requirements.md to verify the outline covers all key messages and matches the target audience and duration."
        quality_criteria:
          "Narrative Arc": "Slides follow a coherent story: opening hook, body sections, and closing call-to-action or summary."
          "Speaker Notes Present": "Every slide has speaker notes explaining what to say."
          "Media Assigned": "Each media asset from the manifest appears in at least one slide. Unresolved slots are marked with TODO comments."
          "Slide Count Match": "The number of slides matches the target from presentation_requirements.md (within ±2)."

  - id: presentation_build_deck
    name: "Build Slidev Deck"
    description: "Scaffold a Slidev markdown presentation from the outline. Embed media references, speaker notes, and TODO comments for items requiring manual review before delivery."
    instructions_file: steps/presentation_build_deck.md
    inputs:
      - file: presentation_outline.md
        from_step: presentation_outline
      - file: presentation_media_manifest.md
        from_step: presentation_search_media
    outputs:
      presentation_slides_path.txt:
        type: file
        description: "Path to the generated slides.md file (the Slidev entry point)"
        required: true
    dependencies:
      - presentation_outline
      - presentation_search_media
    reviews:
      - run_each: presentation_slides_path.txt
        additional_review_guidance: "Read the slides.md at the path in presentation_slides_path.txt to verify structure and content."
        quality_criteria:
          "Valid Slidev Markdown": "The file uses correct Slidev frontmatter and --- slide separators with no syntax errors."
          "All Slides Present": "Every slide from presentation_outline.md is represented in the deck."
          "Layouts Used": "Slides use appropriate Slidev layouts (cover, center, two-cols, image-right, etc.) rather than blank defaults."
          "Speaker Notes Included": "Each slide has a <!-- --> or notes: block with speaker guidance."
          "TODO Comments Present": "Slides with unresolved media or content have <!-- TODO: ... --> comments so the human can review them before presenting."

  - id: presentation_review_deck
    name: "Review Presentation Deck"
    description: "Run a structured review of the Slidev deck: narrative quality, slide flow, media placement, speaker note completeness, and presenter readiness. Apply fixes."
    instructions_file: steps/presentation_review_deck.md
    inputs:
      - file: presentation_outline.md
        from_step: presentation_outline
      - file: presentation_slides_path.txt
        from_step: presentation_build_deck
    outputs:
      presentation_review_report.md:
        type: file
        description: "Review findings: issues per slide, narrative verdict, and list of edits applied"
        required: true
      presentation_slides_revised_path.txt:
        type: file
        description: "Path to the revised slides.md after applying review fixes (may equal presentation_slides_path.txt if no changes were needed)"
        required: true
    dependencies:
      - presentation_outline
      - presentation_build_deck
    reviews:
      - run_each: presentation_review_report.md
        additional_review_guidance: "Read the slides.md at the path in presentation_slides_revised_path.txt to verify that all identified issues have been fixed in the actual deck."
        quality_criteria:
          "Per-Slide Coverage": "The report addresses every slide by number, even if just 'no issues'."
          "Actionable Findings": "Each issue includes the slide number, the problem, and the specific fix applied."
          "Narrative Verdict": "The report includes an overall narrative verdict: does the deck tell a clear story?"
          "Revision Applied": "All identified issues are fixed in the revised slides.md before this step completes."

  - id: presentation_deliver
    name: "Deliver Presentation to Notes Repo"
    description: "Copy the final Slidev deck and media assets to ~/notes, track binary assets with git LFS, commit, and produce a delivery summary with serve/export commands."
    instructions_file: steps/presentation_deliver.md
    inputs:
      - file: presentation_requirements.md
        from_step: presentation_gather_requirements
      - file: presentation_slides_revised_path.txt
        from_step: presentation_review_deck
    outputs:
      presentation_delivery_summary.md:
        type: file
        description: "Delivery summary: notes repo path, git LFS tracked files, slide count, serve command, export command, and remaining TODO items for the human to resolve"
        required: true
    dependencies:
      - presentation_gather_requirements
      - presentation_review_deck
    reviews:
      - run_each: presentation_delivery_summary.md
        quality_criteria:
          "Notes Repo Path": "The summary shows the exact path in ~/notes where the deck was saved."
          "Git LFS Confirmed": "Binary assets (images, videos) are listed as git LFS tracked files."
          "Committed": "The summary confirms a git commit was made in the notes repo with a conventional-commit message."
          "Serve Command Included": "The summary shows the exact command to preview the deck locally with Slidev."
          "Open TODOs Listed": "Any unresolved TODO comments from the deck are enumerated so the human knows what to review."
