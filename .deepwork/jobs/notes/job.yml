name: notes
version: "1.0.0"
summary: "Initialize, migrate, and maintain zk Zettelkasten notebooks for notes repos"
common_job_info_provided_to_all_steps_at_runtime: |
  This job manages Zettelkasten-structured notes repositories using the `zk` CLI.
  It applies to both human user notes repos and OS agent notes repos (agent-space).

  ## Keystone Notes Architecture

  Notes repos are git-backed repositories synced via `repo-sync` on systemd timers.
  Human users: `keystone.notes` (home-manager module, syncs to `~/notes`).
  OS agents: `keystone.os.agents.<name>.notes` (NixOS module, syncs to `/home/agent-{name}/notes`).

  ## Zettelkasten Structure (standardized by process.knowledge-management convention)

  ```
  notes-repo/
    .zk/
      config.toml             # zk configuration (ID format, groups, wikilinks)
      templates/
        fleeting.md           # Template for inbox notes
        literature.md         # Template for source summaries
        permanent.md          # Template for atomic ideas
        decision.md           # Template for ADRs
        index.md              # Template for Maps of Content
    inbox/                    # Fleeting notes (ephemeral, to be processed)
    literature/               # Literature notes (source summaries)
    notes/                    # Permanent notes (atomic, linked)
    decisions/                # Decision records (context, decision, consequences)
    index/                    # Maps of Content (curated entry points)
    TASKS.yaml                # Agent task state (existing, untouched)
    PROJECTS.yaml             # Agent project config (existing, untouched)
    SCHEDULES.yaml            # Agent schedules (existing, untouched)
  ```

  ## Note ID Schema

  Format: `YYYYMMDDHHmm` (12-digit timestamp, minute precision).
  Filename: `{id} {title-slug}.md` (e.g., `202603201430 zfs-encryption-key-loading.md`).

  ## Required Frontmatter

  ```yaml
  ---
  id: "202603201430"
  title: "Note title"
  type: fleeting | literature | permanent | decision | index
  created: 2026-03-20T14:30:00-05:00
  author: ncrmro
  tags: [topic1, topic2]
  ---
  ```

  ## Key zk Commands

  - `zk init` — Initialize notebook (creates .zk/)
  - `zk new <group>/ --title "Title" --no-input --print-path` — Create note (non-interactive)
  - `zk list --format json --match "query"` — Search notes
  - `zk list --orphan --format json` — Find unlinked notes
  - `zk list --linked-by <path> --format json` — Find outgoing links
  - `zk index` — Rebuild note index

  ## Operational Files

  YAML files (TASKS.yaml, PROJECTS.yaml, SCHEDULES.yaml) and identity files (SOUL.md,
  AGENTS.md) are NOT notes and MUST NOT be modified by this job. The zk indexer
  ignores non-markdown files automatically.

workflows:
  - name: init
    summary: "Initialize a new notes repo with the zk Zettelkasten structure"
    steps:
      - scaffold
      - seed
      - verify_init

  - name: doctor
    summary: "Diagnose and migrate an existing notes repo to standardized zk structure"
    steps:
      - audit
      - plan_migration
      - scaffold
      - migrate
      - verify_doctor

  - name: process_inbox
    summary: "Review fleeting notes in inbox/, promote or discard, link to knowledge graph"
    steps:
      - review_inbox
      - promote
      - link_notes
      - sync

steps:
  # === init workflow ===
  - id: scaffold
    name: "Scaffold Notebook"
    description: "Create .zk/ config, templates, and directory structure"
    instructions_file: steps/scaffold.md
    inputs:
      - name: notes_path
        description: "Path to the notes repo (e.g., ~/notes or /home/agent-drago/notes)"
    outputs:
      scaffold_report.md:
        type: file
        description: "List of created files and directories"
        required: true
    dependencies: []
    reviews: []

  - id: seed
    name: "Seed Index Notes"
    description: "Create initial Maps of Content for the repo's primary topics"
    instructions_file: steps/seed.md
    inputs:
      - file: scaffold_report.md
        from_step: scaffold
    outputs:
      seed_report.md:
        type: file
        description: "List of created index notes with their IDs and topics"
        required: true
    dependencies:
      - scaffold
    reviews: []

  - id: verify_init
    name: "Verify Initialization"
    description: "Run zk index and verify structure, templates, and groups work correctly"
    instructions_file: steps/verify_init.md
    inputs:
      - file: scaffold_report.md
        from_step: scaffold
      - file: seed_report.md
        from_step: seed
    outputs:
      init_report.md:
        type: file
        description: "Verification results: index status, group resolution, template test"
        required: true
    dependencies:
      - scaffold
      - seed
    reviews:
      - run_each: init_report.md
        quality_criteria:
          "Index Clean": "zk index completes without errors."
          "Groups Resolve": "zk list for each group (inbox, literature, notes, decisions, index) returns results or empty without error."
          "Template Works": "A test note created with --no-input has correct frontmatter fields."

  # === doctor workflow ===
  - id: audit
    name: "Audit Existing Repo"
    description: "Inventory existing files, detect structure, frontmatter patterns, and naming conventions"
    instructions_file: steps/audit.md
    inputs:
      - name: notes_path
        description: "Path to the existing notes repo to migrate"
    outputs:
      audit_report.md:
        type: file
        description: "Inventory of existing files, structure analysis, frontmatter patterns, link formats"
        required: true
    dependencies: []
    reviews:
      - run_each: audit_report.md
        quality_criteria:
          "File Count": "The audit includes total markdown file count and breakdown by directory."
          "Frontmatter Analysis": "The audit identifies which files have frontmatter and which fields are present."
          "Link Format Detection": "The audit identifies existing link formats (wikilinks, markdown links, bare URLs)."

  - id: plan_migration
    name: "Plan Migration"
    description: "Based on audit, propose a migration plan with file mappings, ID strategy, and directory moves"
    instructions_file: steps/plan_migration.md
    inputs:
      - file: audit_report.md
        from_step: audit
    outputs:
      migration_plan.md:
        type: file
        description: "Migration plan: file-to-type mappings, ID assignment strategy, directory moves, frontmatter additions"
        required: true
    dependencies:
      - audit
    reviews:
      - run_each: migration_plan.md
        quality_criteria:
          "No Data Loss": "The plan does not delete any existing content — only moves and augments."
          "ID Strategy Clear": "The plan specifies how IDs will be assigned (git history, mtime, or new timestamp)."
          "Operational Files Untouched": "TASKS.yaml, PROJECTS.yaml, SCHEDULES.yaml, SOUL.md, AGENTS.md are explicitly excluded."

  # scaffold step is shared with init workflow (defined above)

  - id: migrate
    name: "Execute Migration"
    description: "Execute the migration plan: add frontmatter, assign IDs, move files, convert links"
    instructions_file: steps/migrate.md
    inputs:
      - file: migration_plan.md
        from_step: plan_migration
      - file: scaffold_report.md
        from_step: scaffold
    outputs:
      migration_log.md:
        type: file
        description: "Log of all file transformations with before/after paths and commit hashes"
        required: true
    dependencies:
      - plan_migration
      - scaffold
    reviews:
      - run_each: migration_log.md
        quality_criteria:
          "Commit Per File": "Each file transformation has its own commit for reversibility."
          "Content Preserved": "No content was deleted — only frontmatter additions, directory moves, and link format changes."

  - id: verify_doctor
    name: "Verify Migration"
    description: "Run zk index, check for orphans, dead links, and missing frontmatter"
    instructions_file: steps/verify_doctor.md
    inputs:
      - file: migration_log.md
        from_step: migrate
    outputs:
      doctor_report.md:
        type: file
        description: "Post-migration health check: index status, orphan count, dead links, frontmatter coverage"
        required: true
    dependencies:
      - migrate
    reviews:
      - run_each: doctor_report.md
        quality_criteria:
          "Index Clean": "zk index completes without errors."
          "Frontmatter Coverage": "All markdown files in notes/ have valid frontmatter with id, title, type, created, author, tags."
          "No Dead Links": "No wikilinks point to non-existent notes."

  # === process_inbox workflow ===
  - id: review_inbox
    name: "Review Inbox"
    description: "List all fleeting notes in inbox/, read each, and classify: promote or discard"
    instructions_file: steps/review_inbox.md
    inputs: []
    outputs:
      inbox_review.md:
        type: file
        description: "Classification of each inbox note: promote-to-permanent, promote-to-literature, or discard"
        required: true
    dependencies: []
    reviews: []

  - id: promote
    name: "Promote Notes"
    description: "Create permanent/literature notes from promotable fleeting notes, then delete the originals"
    instructions_file: steps/promote.md
    inputs:
      - file: inbox_review.md
        from_step: review_inbox
    outputs:
      promotion_log.md:
        type: file
        description: "Log of promotions: fleeting note ID -> new permanent/literature note ID"
        required: true
    dependencies:
      - review_inbox
    reviews: []

  - id: link_notes
    name: "Link Notes"
    description: "Ensure newly promoted notes are linked to relevant existing notes and index notes"
    instructions_file: steps/link_notes.md
    inputs:
      - file: promotion_log.md
        from_step: promote
    outputs:
      link_report.md:
        type: file
        description: "List of links added to newly promoted notes and updated index notes"
        required: true
    dependencies:
      - promote
    reviews:
      - run_each: link_report.md
        quality_criteria:
          "No Orphans": "Every newly promoted permanent note links to at least one other note."
          "Index Updated": "Relevant index notes have been updated with links to the new notes."

  - id: sync
    name: "Sync Changes"
    description: "Commit and push all changes via repo-sync"
    instructions_file: steps/sync.md
    inputs:
      - file: link_report.md
        from_step: link_notes
    outputs:
      sync_status.md:
        type: file
        description: "Confirmation that changes were committed and pushed"
        required: true
    dependencies:
      - link_notes
    reviews: []
