name: notes
version: "1.2.0"
summary: "Initialize, repair, and maintain zk notebooks for notes, projects, and reports"
common_job_info_provided_to_all_steps_at_runtime: |
  This job manages Zettelkasten-structured notes repositories using the `zk` CLI.
  It applies to both human user notes repos and OS agent notes repos (agent-space).

  ## Keystone Notes Architecture

  Notes repos are git-backed repositories synced via `repo-sync` on systemd timers.
  Human users: `keystone.notes` (home-manager module, syncs to `~/notes`).
  OS agents: `keystone.os.agents.<name>.notes` (NixOS module, syncs to `/home/agent-{name}/notes`).

  ## Zettelkasten Structure (standardized by process.knowledge-management and
  process.notes conventions)

  ```
  notes-repo/
    .zk/
      config.toml             # zk configuration (ID format, groups, wikilinks)
      templates/
        fleeting.md           # Template for inbox notes
        literature.md         # Template for source summaries
        permanent.md          # Template for atomic ideas
        decision.md           # Template for ADRs
        report.md             # Template for time-stamped workflow reports
        index.md              # Template for Maps of Content
    inbox/                    # Fleeting notes (ephemeral, to be processed)
    literature/               # Literature notes (source summaries)
    notes/                    # Permanent notes (atomic, linked)
    decisions/                # Decision records (context, decision, consequences)
    reports/                  # Report notes (diagnostics, research, run outputs)
    index/                    # Maps of Content (curated entry points)
    archive/                  # Archived project notes retained in zk
    TASKS.yaml                # Agent task state (existing, untouched)
    PROJECTS.yaml             # Agent project config (existing, untouched)
    SCHEDULES.yaml            # Agent schedules (existing, untouched)
  ```

  ## Note ID Schema

  Format: `YYYYMMDDHHmm` (12-digit timestamp, minute precision).
  Filename: `{id} {title-slug}.md` (e.g., `202603201430 zfs-encryption-key-loading.md`).

  ## Required Frontmatter

  ```yaml
  ---
  id: "202603201430"
  title: "Note title"
  type: fleeting | literature | permanent | decision | report | index
  created: 2026-03-20T14:30:00-05:00
  author: ncrmro
  tags: [topic1, topic2]
  ---
  ```

  ## Key zk Commands

  - `zk init` — Initialize notebook (creates .zk/)
  - `zk new <group>/ --title "Title" --no-input --print-path` — Create note (non-interactive)
  - `zk list --format json --match "query"` — Search notes
  - `zk list --orphan --format json` — Find unlinked notes
  - `zk list --linked-by <path> --format json` — Find outgoing links
  - `zk list reports/ --sort created- --format json` — Inspect report chains
  - `zk index` — Rebuild note index

  ## Operational Files

  YAML files (TASKS.yaml, PROJECTS.yaml, SCHEDULES.yaml) and identity files (SOUL.md,
  AGENTS.md) are NOT notes and MUST NOT be modified by this job. The zk indexer
  ignores non-markdown files automatically, but notes repos still MUST maintain a
  `.gitignore` for zk database files and other local junk.

workflows:
  - name: init
    summary: "Initialize a new notes repo with the zk Zettelkasten structure"
    steps:
      - scaffold
      - seed
      - verify_init

  - name: doctor
    summary: "Diagnose and repair an existing notes repo to the standardized notebook structure"
    steps:
      - audit
      - repair_notebook
      - verify_doctor

  - name: process_inbox
    summary: "Review fleeting notes in inbox/, promote or discard, link to knowledge graph"
    steps:
      - review_inbox
      - promote
      - link_notes
      - sync

  - name: project_hub
    summary: "Create or refresh a single project hub note and ensure linked project context is discoverable"
    steps:
      - project_hub

  - name: report
    summary: "Create a standardized report note, chain it to the latest prior report, and link it to the project hub"
    steps:
      - capture_report

steps:
  # === init workflow ===
  - id: scaffold
    name: "Scaffold Notebook"
    description: "Create .zk/ config, templates, and directory structure"
    instructions_file: steps/scaffold.md
    inputs:
      - name: notes_path
        description: "Path to the notes repo (e.g., ~/notes or /home/agent-drago/notes)"
    outputs:
      scaffold_report.md:
        type: file
        description: "List of created files and directories"
        required: true
    dependencies: []
    reviews: []

  - id: seed
    name: "Seed Index Notes"
    description: "Create initial Maps of Content for the repo's primary topics"
    instructions_file: steps/seed.md
    inputs:
      - file: scaffold_report.md
        from_step: scaffold
    outputs:
      seed_report.md:
        type: file
        description: "List of created index notes with their IDs and topics"
        required: true
    dependencies:
      - scaffold
    reviews: []

  - id: verify_init
    name: "Verify Initialization"
    description: "Run zk index and verify structure, templates, and groups work correctly"
    instructions_file: steps/verify_init.md
    inputs:
      - file: scaffold_report.md
        from_step: scaffold
      - file: seed_report.md
        from_step: seed
    outputs:
      init_report.md:
        type: file
        description: "Verification results: index status, group resolution, template test"
        required: true
    dependencies:
      - scaffold
      - seed
    reviews:
      - run_each: init_report.md
        quality_criteria:
          "Index Clean": "zk index completes without errors."
          "Groups Resolve": "zk list for each group (inbox, literature, notes, decisions, reports, index, archive) returns results or empty without error."
          "Template Works": "A test note created with --no-input has correct frontmatter fields."
          "Gitignore Present": "A root .gitignore exists and ignores zk database files plus standard local junk without ignoring TASKS.yaml, PROJECTS.yaml, or SCHEDULES.yaml."

  # === doctor workflow ===
  - id: audit
    name: "Audit Existing Repo"
    description: "Inventory existing files, detect structure, frontmatter patterns, and naming conventions"
    instructions_file: steps/audit.md
    inputs:
      - name: notes_path
        description: "Path to the existing notes repo to repair"
    outputs:
      audit_report.md:
        type: file
        description: "Inventory of existing files, structure analysis, frontmatter patterns, link formats"
        required: true
    dependencies: []
    reviews:
      - run_each: audit_report.md
        quality_criteria:
          "File Count": "The audit includes total markdown file count and breakdown by directory."
          "Frontmatter Analysis": "The audit identifies which files have frontmatter and which fields are present."
          "Link Format Detection": "The audit identifies existing link formats (wikilinks, markdown links, bare URLs)."

  - id: repair_notebook
    name: "Repair Notebook"
    description: "Normalize groups, frontmatter, report chains, project hubs, and archive placement"
    instructions_file: steps/repair_notebook.md
    inputs:
      - file: audit_report.md
        from_step: audit
    outputs:
      repair_log.md:
        type: file
        description: "Log of note repairs, archive moves, report chaining, and project hub updates"
        required: true
    dependencies:
      - audit
    reviews:
      - run_each: repair_log.md
        quality_criteria:
          "Frontmatter Normalized": "Touched notes have the required fields for their type."
          "Report Chains Updated": "Recurring reports link to the latest prior report when one exists."
          "Project Hubs Updated": "Each active project has one discoverable hub note linked from related reports or decisions."
          "Gitignore Repaired": "The root .gitignore includes required ignore patterns for zk database files and local junk."

  - id: verify_doctor
    name: "Verify Repair"
    description: "Run zk index, check for orphans, dead links, report chains, and missing frontmatter"
    instructions_file: steps/verify_doctor.md
    inputs:
      - file: repair_log.md
        from_step: repair_notebook
    outputs:
      doctor_report.md:
        type: file
        description: "Post-repair health check: index status, orphan count, dead links, frontmatter coverage, and report chain status"
        required: true
    dependencies:
      - repair_notebook
    reviews:
      - run_each: doctor_report.md
        quality_criteria:
          "Index Clean": "zk index completes without errors."
          "Frontmatter Coverage": "All markdown files in notes/, literature/, decisions/, reports/, index/, and archive/ have valid frontmatter where required."
          "No Dead Links": "No wikilinks point to non-existent notes."
          "Gitignore Verified": "Verification confirms required .gitignore entries exist and transient zk database files are ignored by git."

  # === process_inbox workflow ===
  - id: review_inbox
    name: "Review Inbox"
    description: "List all fleeting notes in inbox/, read each, and classify: promote or discard"
    instructions_file: steps/review_inbox.md
    inputs: []
    outputs:
      inbox_review.md:
        type: file
        description: "Classification of each inbox note: promote-to-permanent, promote-to-literature, or discard"
        required: true
    dependencies: []
    reviews: []

  - id: promote
    name: "Promote Notes"
    description: "Create permanent/literature notes from promotable fleeting notes, then delete the originals"
    instructions_file: steps/promote.md
    inputs:
      - file: inbox_review.md
        from_step: review_inbox
    outputs:
      promotion_log.md:
        type: file
        description: "Log of promotions: fleeting note ID -> new permanent/literature note ID"
        required: true
    dependencies:
      - review_inbox
    reviews: []

  - id: link_notes
    name: "Link Notes"
    description: "Ensure newly promoted notes are linked to relevant existing notes and index notes"
    instructions_file: steps/link_notes.md
    inputs:
      - file: promotion_log.md
        from_step: promote
    outputs:
      link_report.md:
        type: file
        description: "List of links added to newly promoted notes and updated index notes"
        required: true
    dependencies:
      - promote
    reviews:
      - run_each: link_report.md
        quality_criteria:
          "No Orphans": "Every newly promoted permanent note links to at least one other note."
          "Index Updated": "Relevant index notes, especially project hub notes, have been updated with links to the new notes."

  - id: sync
    name: "Sync Changes"
    description: "Commit and push all changes via repo-sync"
    instructions_file: steps/sync.md
    inputs:
      - file: link_report.md
        from_step: link_notes
    outputs:
      sync_status.md:
        type: file
        description: "Confirmation that changes were committed and pushed"
        required: true
    dependencies:
      - link_notes
    reviews: []

  - id: project_hub
    name: "Create or Refresh Project Hub"
    description: "Ensure the project has one active hub note with the standard sections and links"
    instructions_file: steps/project_hub.md
    inputs:
      - name: project_slug
        description: "Canonical project slug used in tags and frontmatter"
      - name: project_title
        description: "Human-readable project name for the hub note title"
    outputs:
      project_hub_report.md:
        type: file
        description: "Hub note path plus linked reports, decisions, and repos discovered during creation or refresh"
        required: true
    dependencies: []
    reviews:
      - run_each: project_hub_report.md
        quality_criteria:
          "Single Active Hub": "Exactly one active index note exists for the project."
          "Required Sections": "The hub note includes objective, current state, next actions, curated links, and report ledger sections."
          "Canonical Tags": "The hub note includes project/<slug> and status/active."

  - id: capture_report
    name: "Capture Report"
    description: "Create a standardized report note, chain it to the latest prior report, and link it to the project hub"
    instructions_file: steps/capture_report.md
    inputs:
      - name: project_slug
        description: "Canonical project slug used in tags and frontmatter"
      - name: report_title
        description: "Human-readable report title"
      - name: report_kind
        description: "Canonical report kind slug, e.g. fleet-health"
      - name: source_ref
        description: "Workflow, command, file path, or source that generated the report"
    outputs:
      report_capture.md:
        type: file
        description: "Created report path, applied tags, previous report link, and project hub update status"
        required: true
    dependencies: []
    reviews:
      - run_each: report_capture.md
        quality_criteria:
          "Report Created": "A report note exists in reports/ with the requested title and canonical frontmatter."
          "Chain Maintained": "If a previous report exists, the new note references it."
          "Hub Linked": "The project hub links to the new report note."
