name: agent_builder
version: "3.2.0"
summary: "Bootstrap agent-space repos, create conventions, onboard agents, and diagnose health issues"
common_job_info_provided_to_all_steps_at_runtime: |
  This job handles three aspects of agent lifecycle management:

  1. **Bootstrap** — Create agent-space repos with identity, roles, shared context, and task loop files
  2. **Create** — Write RFC 2119 convention documents and wire them into mode manifests
  3. **Onboard** — Sign into all configured services and set up local CLIs
  4. **Doctor** — Diagnose agent health: check timers, analyze logs, identify failures, recommend fixes
  5. **Issue** — File infrastructure issues on the admin's nixos-config repo (ncrmro/keystone)

  ## Agent-Space Structure

  Each agent-space is a self-contained git repo containing identity (SOUL.md), task queue
  (TASKS.yaml), project registry (PROJECTS.yaml), operational rules (AGENTS.md), and a
  manifest mapping modes to shared roles and conventions from ncrmro/agents.

  Directory structure produced (the repo root IS the agent's working directory):

    .repos/{owner}/{repo}/           # Git repo root (gitignored in obsidian, pushed to Forgejo)
      .agents/                       # Git submodule (ncrmro/agents)
      .deepwork -> .agents/.deepwork  # Symlink through submodule
      flake.nix                          # Copied from shared agents (Nix dev shell)
      flake.lock                         # Copied from shared agents
      .envrc                         # direnv integration (use flake)
      SOUL.md                        # Agent identity, accounts, personality
      AGENTS.md -> .agents/ncrmro/agents/AGENTS_TEMPLATE.md  # Symlink to shared template
      CLAUDE.md -> AGENTS.md         # Symlink for Claude Code compatibility
      PROJECTS.yaml                  # Priority-ordered project registry with source commands
      TASKS.yaml                     # Work queue (pending/in_progress/completed/blocked)
      SCHEDULES.yaml                 # Recurring task definitions
      ISSUES.yaml                    # Blockers discovered during execution
      REQUIREMENTS.md                # Task loop requirements (RFC 2119)
      ARCHITECTURE.md                # System architecture diagrams
      SERVICES.md                    # Available services and endpoints
      HUMAN.md                       # Human operator contact info
      manifests/
        modes.yaml                   # Maps agent modes to shared roles + conventions

  The shared agents library (ncrmro/agents) provides:
    - Role templates: architect, software-engineer, code-reviewer, business-analyst, project-lead, uiux-designer, mechanical-engineer, electrical-engineer, etc.
    - Convention docs: code.typescript, ops.vcs, biz.press-release, etc.
    - compose.sh: assembles system prompts from manifest + mode
    - Shared fragments: RFC 2119 preamble, output format rules

  Existing agent reference: Drago (engineering agent) at /home/agent-drago/notes/
  uses PROJECTS.yaml for priority-ordered project list, TASKS.yaml for work queue,
  SCHEDULES.yaml for recurring tasks, and SOUL.md for identity.

  ## Convention Format Rules

  - File begins with: <!-- RFC 2119: MUST, MUST NOT, SHOULD, SHOULD NOT, MAY -->
  - H1 title: # Convention: {Display Name} ({dotted.name})
  - Naming: {domain}.{topic}.md — domains are ops, code, biz
  - Rules are numbered consecutively across all sections
  - Use RFC 2119 keywords (MUST, SHOULD, MAY, etc.) for each rule
  - Reference SOUL.md for agent-specific values — never hardcode names, emails, credentials
  - Conventions MAY include a "## Golden Example" section at the end

  File location:
  - If the working directory IS the agents repo (contains compose.sh, roles/, conventions/):
    write to conventions/{domain}.{topic}.md
  - Otherwise: write to .agents/conventions/{domain}.{topic}.md

  Manifest location:
  - modes.yaml lives at manifests/modes.yaml in the agent-space repo
  - Each mode lists conventions by dotted name (e.g., ops.bitwarden, code.typescript)

  ## Onboarding Context

  Key files:
  - SOUL.md: Agent identity, account table (service, host, username, auth method, credentials)
  - SERVICES.md: Available intranet services (Forgejo, Stalwart, Vaultwarden)
  - .agents/conventions/ops.bitwarden.md: rbw/Vaultwarden usage conventions

  Credentials are stored in Vaultwarden and accessed via the `rbw` CLI.
  Browser-based sign-ins use Chrome DevTools MCP tools.
  Google OAuth is used as the auth method for services that support it (e.g., GitHub).

  At the end of onboarding, SOUL.md must reflect any new accounts or updated credentials,
  and new credentials must be saved to rbw.

  ## Doctor Context

  Agents run as systemd user services on NixOS. Three timers per agent:
  - `agent-{name}-notes-sync` — git fetch/commit/push every 5 min
  - `agent-{name}-task-loop` — autonomous work cycle every 5 min (1h timeout, flock)
  - `agent-{name}-scheduler` — reads SCHEDULES.yaml daily at 5 AM, creates due tasks

  Monitoring commands (run as root or via agentctl):
  - `agentctl {name} status agent-{name}-{timer}` — check timer/service status
  - `agentctl {name} journalctl -u agent-{name}-{timer} -n 50` — view logs
  - `agentctl {name} start agent-{name}-task-loop` — manually trigger

  Log locations:
  - Notes sync: `~/.local/state/notes-sync/logs/`
  - Task loop: `~/.local/state/agent-task-loop/logs/`
  - Per-task logs: `~/.local/state/agent-task-loop/logs/tasks/`
  - Scheduler: `~/.local/state/agent-scheduler/logs/`

  Task loop phases: pre-fetch → ingest → prioritize → execute → commit
  Structured log tags: `[step=X]`, `[task=Y]`

  Common failure modes:
  - Auth expired (gh/fj token, rbw locked)
  - Merge conflict in notes-sync (rebase fails)
  - Task loop flock contention (previous run still active)
  - Missing dev shell (direnv not allowed, flake eval error)
  - Scheduler YAML parse error (malformed SCHEDULES.yaml)

  ## Issue Context

  When agents discover infrastructure problems they cannot fix themselves (NixOS config
  changes, secret provisioning, service restarts requiring root), they file issues on
  the admin's nixos-config repo.

  - **Repo:** ncrmro/keystone (on GitHub)
  - **Admin GitHub username:** ncrmro (from TEAM.md)
  - **CLI:** `gh issue create --repo ncrmro/keystone`
  - Issues MUST be assigned to the admin (`--assignee ncrmro`)
  - Issues SHOULD include the agent name, affected service, and exact error/evidence
  - Issues MAY reference doctor workflow output (diagnosis, prescription) for context

workflows:
  - name: bootstrap
    summary: "Create a new agent-space repo from scratch with identity, roles, and shared context"
    steps:
      - gather_identity
      - select_roles
      - scaffold
      - review_and_refine

  - name: create
    summary: "Gather requirements, draft convention, review, and wire into modes"
    steps:
      - gather_requirements
      - draft_convention
      - review_convention
      - wire_mode

  - name: onboard
    summary: "Full agent onboarding — sign into all services and configure CLIs"
    steps:
      - read_config
      - unlock_vault
      - setup_google
      - [setup_github, setup_forgejo]
      - verify
      - update_soul

  - name: doctor
    summary: "Diagnose agent health — check timers, analyze logs, and recommend fixes"
    steps:
      - check_health
      - analyze_logs
      - diagnose
      - prescribe

  - name: issue
    summary: "File an infrastructure issue on the admin's nixos-config repo"
    steps:
      - draft_issue
      - file_issue

steps:
  # === bootstrap workflow ===
  - id: gather_identity
    name: "Gather Agent Identity"
    description: "Interview the user to define the agent's name, purpose, accounts, and personality"
    instructions_file: steps/gather_identity.md
    inputs:
      - name: agent_name
        description: "The agent's name (e.g., 'drago', 'luce')"
      - name: owner
        description: "Git owner/org for the repo (e.g., 'drago', 'luce', 'ncrmro')"
      - name: repo
        description: "Git repo name (e.g., 'agent-space')"
    outputs:
      soul_draft:
        type: file
        description: "Draft SOUL.md with agent identity, accounts, and personality"
        required: true
    reviews:
      - run_each: soul_draft
        quality_criteria:
          "Identity Complete": "SOUL.md contains name, email, and at least one account entry."
          "No Placeholder Text": "All bracketed placeholders have been replaced with real or brainstormed values."

  - id: select_roles
    name: "Select Roles and Conventions"
    description: "Present available roles and conventions from ncrmro/agents, let user pick which apply"
    instructions_file: steps/select_roles.md
    inputs:
      - file: soul_draft
        from_step: gather_identity
    outputs:
      manifest:
        type: file
        description: "modes.yaml manifest mapping agent modes to shared roles and conventions"
        required: true
      new_content_recommendations:
        type: file
        description: "Recommendations for new roles or conventions not yet in the shared library"
        required: false
    dependencies:
      - gather_identity
    reviews:
      - run_each: manifest
        additional_review_guidance: "Read the roles/ and conventions/ directories in the ncrmro/agents repo to verify referenced files exist."
        quality_criteria:
          "Valid References": "All role and convention filenames in the manifest correspond to existing files in ncrmro/agents."
          "Has Defaults": "The manifest declares defaults.shared with rfc2119-preamble.md and output-format-rules.md."
          "At Least One Mode": "The manifest defines at least one mode with at least one role."

  - id: scaffold
    name: "Scaffold Agent-Space"
    description: "Create the directory structure, git repo, submodule, symlinks, and all agent-space files"
    instructions_file: steps/scaffold.md
    inputs:
      - file: soul_draft
        from_step: gather_identity
      - file: manifest
        from_step: select_roles
    outputs:
      agent_space_files:
        type: files
        description: "All created files in the agent-space repo"
        required: true
    dependencies:
      - gather_identity
      - select_roles
    reviews: []

  - id: review_and_refine
    name: "Review and Refine"
    description: "Present the complete agent-space to the user, offer to update files or create new roles/conventions"
    instructions_file: steps/review_and_refine.md
    inputs:
      - file: agent_space_files
        from_step: scaffold
    outputs:
      summary:
        type: file
        description: "Summary of the created agent-space and any refinements made"
        required: true
    dependencies:
      - scaffold
    reviews: []

  # === create workflow ===
  - id: gather_requirements
    name: "Gather Requirements"
    description: "Collect convention topic, domain, and rules from the user"
    instructions_file: steps/gather_requirements.md
    inputs:
      - name: convention_topic
        description: "The tool, language, or process to write a convention for (e.g., 'Docker', 'Go', 'Slack')"
    outputs:
      requirements.md:
        type: file
        description: "Summary of convention domain, topic, display name, dotted name, and rules to codify"
        required: true
    dependencies: []
    reviews: []

  - id: draft_convention
    name: "Draft Convention"
    description: "Write the convention file in RFC 2119 format"
    instructions_file: steps/draft_convention.md
    inputs:
      - file: requirements.md
        from_step: gather_requirements
    outputs:
      convention_file:
        type: file
        description: "The convention markdown file at its final path (e.g., .agents/conventions/ops.docker.md)"
        required: true
    dependencies:
      - gather_requirements
    reviews:
      - run_each: convention_file
        additional_review_guidance: "Read the requirements.md from the gather_requirements step to verify all requested rules are covered. Also read 2-3 existing conventions in .agents/conventions/ to check format consistency."
        quality_criteria:
          "RFC 2119 Format": "File begins with the RFC 2119 comment, has the correct H1 title format, and uses numbered rules with RFC 2119 keywords."
          "Complete Coverage": "All rules identified in requirements.md are addressed in the convention."
          "No Hardcoded Values": "Agent-specific values (names, emails, credentials) reference SOUL.md rather than being hardcoded."

  - id: review_convention
    name: "Review Convention"
    description: "Check for duplication or conflicts with existing conventions"
    instructions_file: steps/review_convention.md
    inputs:
      - file: convention_file
        from_step: draft_convention
    outputs:
      review_report.md:
        type: file
        description: "Report on conflicts, duplication, or issues found — or confirmation that the convention is clean"
        required: true
    dependencies:
      - draft_convention
    reviews:
      - run_each: step
        quality_criteria:
          "Thorough Check": "The review checked for rule duplication against at least the most related existing conventions."
          "Actionable Feedback": "Any issues found include specific remediation suggestions."

  - id: wire_mode
    name: "Wire into Mode"
    description: "Add the new convention to the appropriate mode(s) in modes.yaml"
    instructions_file: steps/wire_mode.md
    inputs:
      - file: convention_file
        from_step: draft_convention
      - file: review_report.md
        from_step: review_convention
    outputs:
      updated_modes_yaml:
        type: file
        description: "The updated manifests/modes.yaml with the new convention added to the appropriate mode(s)"
        required: true
    dependencies:
      - draft_convention
      - review_convention
    reviews:
      - run_each: updated_modes_yaml
        quality_criteria:
          "Correct Placement": "The convention is added to the mode(s) that logically match its domain and topic."
          "Valid YAML": "The modes.yaml file remains valid YAML with correct indentation."

  # === onboard workflow ===
  - id: read_config
    name: "Read Configuration"
    description: "Parse SOUL.md and SERVICES.md to inventory accounts and services requiring setup"
    instructions_file: steps/read_config.md
    inputs: []
    outputs:
      onboarding_plan.md:
        type: file
        description: "Inventory of accounts, services, and CLIs to set up with current status"
        required: true
    dependencies: []
    reviews:
      - run_each: onboarding_plan.md
        additional_review_guidance: "Read SOUL.md and SERVICES.md to verify the plan covers all listed accounts and services."
        quality_criteria:
          "Complete Coverage": "Every account in SOUL.md and every service in SERVICES.md is listed in the plan."
          "Actionable Steps": "Each item has a clear action (sign in, configure CLI, create account, etc.)."

  - id: unlock_vault
    name: "Unlock Vault"
    description: "Ensure rbw is unlocked and all required credentials are accessible"
    instructions_file: steps/unlock_vault.md
    inputs:
      - file: onboarding_plan.md
        from_step: read_config
    outputs:
      vault_status.md:
        type: file
        description: "Confirmation that vault is unlocked and lists which credentials were found vs missing"
        required: true
    dependencies:
      - read_config
    reviews: []

  - id: setup_google
    name: "Set Up Google"
    description: "Sign into Google/Gmail via browser using credentials from rbw"
    instructions_file: steps/setup_google.md
    inputs:
      - file: vault_status.md
        from_step: unlock_vault
    outputs:
      google_status.md:
        type: file
        description: "Confirmation of successful Google sign-in with account details"
        required: true
    dependencies:
      - unlock_vault
    reviews: []

  - id: setup_github
    name: "Set Up GitHub"
    description: "Sign into GitHub via Google OAuth, create account if needed, and configure gh CLI"
    instructions_file: steps/setup_github.md
    inputs:
      - file: google_status.md
        from_step: setup_google
    outputs:
      github_status.md:
        type: file
        description: "Confirmation of GitHub sign-in and gh CLI configuration with username"
        required: true
    dependencies:
      - setup_google
    reviews: []

  - id: setup_forgejo
    name: "Set Up Forgejo"
    description: "Sign into Forgejo and configure fj CLI using API token from rbw"
    instructions_file: steps/setup_forgejo.md
    inputs:
      - file: vault_status.md
        from_step: unlock_vault
    outputs:
      forgejo_status.md:
        type: file
        description: "Confirmation of Forgejo sign-in and fj CLI configuration"
        required: true
    dependencies:
      - unlock_vault
      - setup_google
    reviews: []

  - id: verify
    name: "Verify Access"
    description: "Run verification checks on all services and CLIs to confirm working access"
    instructions_file: steps/verify.md
    inputs:
      - file: google_status.md
        from_step: setup_google
      - file: github_status.md
        from_step: setup_github
      - file: forgejo_status.md
        from_step: setup_forgejo
    outputs:
      verification_report.md:
        type: file
        description: "Pass/fail status for each service and CLI with error details if any"
        required: true
    dependencies:
      - setup_google
      - setup_github
      - setup_forgejo
    reviews:
      - run_each: verification_report.md
        quality_criteria:
          "All Services Checked": "Every service from the onboarding plan has a pass/fail result."
          "Failures Documented": "Any failures include error details and suggested remediation."

  - id: update_soul
    name: "Update SOUL.md"
    description: "Update SOUL.md with any new accounts, usernames, or auth methods; save new credentials to rbw"
    instructions_file: steps/update_soul.md
    inputs:
      - file: verification_report.md
        from_step: verify
    outputs:
      changelog.md:
        type: file
        description: "Summary of changes made to SOUL.md and credentials saved to rbw"
        required: true
    dependencies:
      - verify
    reviews:
      - run_each: changelog.md
        additional_review_guidance: "Read SOUL.md to verify the accounts table is accurate and complete."
        quality_criteria:
          "SOUL.md Accurate": "The accounts table in SOUL.md matches the actual state of all configured services."
          "Credentials Saved": "All new or updated credentials have been saved to rbw."

  # === doctor workflow ===
  - id: check_health
    name: "Check Health"
    description: "Run status checks on all agent timers, services, and prerequisites"
    instructions_file: steps/check_health.md
    inputs:
      - name: agent_name
        description: "The agent name to diagnose (e.g., 'luce', 'drago')"
    outputs:
      health_snapshot.md:
        type: file
        description: "Status snapshot of all timers, services, and prerequisites with pass/fail for each"
        required: true
    dependencies: []
    reviews:
      - run_each: health_snapshot.md
        quality_criteria:
          "All Timers Checked": "The snapshot includes status for all three timers: notes-sync, task-loop, and scheduler."
          "All Prerequisites Checked": "The snapshot includes pass/fail for all prerequisites: git repo, SSH agent, rbw vault, direnv, flake, gh CLI, fj CLI, TASKS.yaml, SCHEDULES.yaml, SOUL.md."

  - id: analyze_logs
    name: "Analyze Logs"
    description: "Fetch and parse recent logs from all agent services to identify errors and patterns"
    instructions_file: steps/analyze_logs.md
    inputs:
      - file: health_snapshot.md
        from_step: check_health
    outputs:
      log_analysis.md:
        type: file
        description: "Extracted errors, warnings, and patterns from recent logs grouped by service"
        required: true
    dependencies:
      - check_health
    reviews:
      - run_each: log_analysis.md
        additional_review_guidance: "Read health_snapshot.md to verify that services with failures had their logs analyzed."
        quality_criteria:
          "Failed Services Analyzed": "Every service marked as failed or degraded in the health snapshot has corresponding log entries extracted."
          "Errors Extracted": "Actual error messages are quoted from logs, not paraphrased or summarized without evidence."

  - id: diagnose
    name: "Diagnose Issues"
    description: "Correlate health status and log data to identify root causes of failures"
    instructions_file: steps/diagnose.md
    inputs:
      - file: health_snapshot.md
        from_step: check_health
      - file: log_analysis.md
        from_step: analyze_logs
    outputs:
      diagnosis.md:
        type: file
        description: "Root cause analysis for each identified issue with severity and affected components"
        required: true
    dependencies:
      - check_health
      - analyze_logs
    reviews:
      - run_each: diagnosis.md
        additional_review_guidance: "Read health_snapshot.md and log_analysis.md to verify the diagnosis accounts for all reported failures and log errors."
        quality_criteria:
          "Complete Coverage": "Every failure from the health snapshot has a corresponding diagnosis entry."
          "Root Cause Identified": "Each issue has a plausible root cause, not just a symptom restatement."

  - id: prescribe
    name: "Prescribe Fixes"
    description: "Produce actionable fix commands and remediation steps for each diagnosed issue"
    instructions_file: steps/prescribe.md
    inputs:
      - file: diagnosis.md
        from_step: diagnose
    outputs:
      prescription.md:
        type: file
        description: "Ordered list of fix actions with exact commands, expected outcomes, and verification steps"
        required: true
    dependencies:
      - diagnose
    reviews:
      - run_each: prescription.md
        additional_review_guidance: "Read diagnosis.md to verify every diagnosed issue has a corresponding fix action."
        quality_criteria:
          "Actionable Commands": "Each fix includes exact shell commands or file edits that can be executed directly."
          "Safe Operations": "Destructive actions are flagged with warnings and have rollback instructions."
          "Verification Steps": "Each fix includes a command to verify the fix worked."

  # === issue workflow ===
  - id: draft_issue
    name: "Draft Issue"
    description: "Gather issue details and draft a GitHub issue for the admin's nixos-config repo"
    instructions_file: steps/draft_issue.md
    inputs:
      - name: issue_description
        description: "Description of the infrastructure problem (e.g., 'scheduler permission denied', 'missing flake.nix for agent-luce')"
    outputs:
      issue_draft.md:
        type: file
        description: "Draft issue with title, body, labels, and assignee ready for filing"
        required: true
    dependencies: []
    reviews:
      - run_each: issue_draft.md
        quality_criteria:
          "Actionable Title": "The issue title clearly states the problem and affected agent/component."
          "Sufficient Detail": "The issue body includes the agent name, affected service, error evidence, and expected vs actual behavior."
          "Assigned": "The draft specifies the admin as assignee."

  - id: file_issue
    name: "File Issue"
    description: "Create the GitHub issue on ncrmro/keystone and return the issue URL"
    instructions_file: steps/file_issue.md
    inputs:
      - file: issue_draft.md
        from_step: draft_issue
    outputs:
      issue_url.md:
        type: file
        description: "Confirmation with the created issue number and URL"
        required: true
    dependencies:
      - draft_issue
    reviews: []
