name: sweng
version: "2.3.1"
summary: "Software engineering lifecycle: design, implement, fix, refactor, and audit with agent orchestration"
common_job_info_provided_to_all_steps_at_runtime: |
  Software engineering workflow with agent orchestration. Handles architecture design,
  implementation, bug fixes, refactoring, and dev environment auditing. Each code-change
  workflow delegates implementation to a sub-agent launched via agentctl.

  Key design principles:
  1. One task per workflow run — the task loop (TASKS.yaml) handles concurrency
  2. TASKS.yaml is the source of truth for task status
  3. Dual-platform: GitHub (gh) and Forgejo (fj), auto-detected from git remote URL
  4. Agents launched via agentctl: `agentctl <agent-name> <agent-type> --project <slug> --worktree <path>`
  5. Convention compliance: process.feature-delivery from keystone governs the workflow
  6. Worktree paths follow the keystone.os standard (see worktree convention below)

  Agent types supported:
  - claude: Claude Code CLI agent
  - gemini: Gemini CLI agent
  - opencode: OpenCode CLI agent
  - claude-local: Claude Code with local Ollama models

  Platform detection (from git remote URL):
  - *github.com* → github → use `gh` CLI
  - *git.ncrmro.com* → forgejo → use `fj` CLI

  Directory layout:
  - .repos/{owner}/{repo}/ — main checkout (stays on default branch)
  - Worktrees created per keystone.os worktree convention
  - TASKS.yaml — task status tracking (agent-space root)

  Repository conventions (from CLAUDE.md / keystone):
  - Internal Forgejo repos: SSH clone to .repos/{owner}/{repo}
  - GitHub repos: gh repo clone to .repos/{owner}/{repo}
  - Conventional commits: type(scope): subject
  - PRs must reference issues with Closes/Fixes keywords
  - Squash merge is the default merge strategy
  - Draft PRs opened immediately (GitHub: --draft, Forgejo: WIP: prefix)

  TASK.md frontmatter schema (written to worktree root):
  ```yaml
  ---
  repo: owner/repo
  branch: feat/task-slug
  agent: claude          # claude | gemini | opencode | claude-local
  platform: github       # auto-detected from remote URL
  issue: 42              # optional, GitHub/Forgejo issue number
  task_type: implement   # implement | fix | refactor
  status: ready          # planning | ready | assigned | completed | merged
  created: 2026-03-21
  ---
  ```

  Workflow semantics:
  - `implement`: New feature or capability. Branch prefix: feat/
  - `fix`: Bug fix. Branch prefix: fix/
  - `refactor`: Code restructuring without behavior change. Branch prefix: refactor/
  - `design`: Architecture document only — no code changes, no agent launch.
  - `audit`: Dev environment health check — no code changes, no agent launch.

  Deploy preview verification:
  When a project deploys to Cloudflare Workers, Vercel, Netlify, or similar platforms,
  preview environments are created automatically on each push. The review step MUST
  verify changes on the deployed preview — CI passing is necessary but not sufficient.
  Always check the actual deployed behavior before merging.

  Keystone conventions checked by audit:
  - tool.nix-devshell: flake.nix, .envrc, direnv, devshell builds
  - process.version-control: .gitignore, conventional commits, commit discipline
  - process.continuous-integration: CI pipeline exists and passes
  - process.code-review-ownership: CODEOWNERS file exists and is valid
  - TDD: test infrastructure exists, tests run, failing tests committed separately

workflows:
  - name: design
    summary: "Create an architecture/design document for a feature or system change"
    steps:
      - design

  - name: implement
    summary: "Full implementation lifecycle: plan, assign agent, review, CI gate, merge, clean up"
    steps:
      - plan
      - assign
      - pull_request_update
      - review
      - postflight

  - name: fix
    summary: "Bug fix lifecycle: plan fix, assign agent, review, CI gate, merge, clean up"
    steps:
      - plan
      - assign
      - pull_request_update
      - review
      - postflight

  - name: refactor
    summary: "Refactoring lifecycle: plan refactor, assign agent, review, CI gate, merge, clean up"
    steps:
      - plan
      - assign
      - pull_request_update
      - review
      - postflight

  - name: audit
    summary: "Audit dev environment: devshell, conventions, TDD path, CI pipeline"
    steps:
      - audit

steps:
  - id: design
    name: "Architecture Design"
    description: >
      Explore the codebase, understand constraints, and produce an architecture/design
      document with diagrams, trade-offs, and implementation recommendations.
    instructions_file: steps/design.md
    exposed: true
    inputs:
      - name: goal
        description: "What to design — a feature, system change, or architectural question"
      - name: repo
        description: "Target repository as owner/repo (e.g., ncrmro/catalyst)"
    outputs:
      design_doc.md:
        type: file
        description: "Architecture/design document with diagrams, constraints, trade-offs, and implementation plan"
        required: true
    dependencies: []
    reviews:
      - run_each: design_doc.md
        quality_criteria:
          "Clear Problem Statement": "The document states what problem is being solved and why the design is needed."
          "Architecture Diagram": "At least one ASCII or text diagram illustrates the proposed architecture or data flow."
          "Trade-offs Documented": "Design decisions include alternatives considered and rationale for the chosen approach."
          "Implementation Path": "The document includes concrete next steps or an implementation plan that could feed into the implement workflow."
          "Constraint Awareness": "The design accounts for existing codebase constraints, conventions, and infrastructure."

  - id: plan
    name: "Task Intake"
    description: >
      Accept a task (TASKS.yaml entry, user prompt, or issue URL). Identify repo
      and platform. Create branch and worktree per process.feature-delivery. Write
      TASK.md with acceptance criteria. Create draft PR. Update TASKS.yaml.
    instructions_file: steps/plan.md
    inputs:
      - name: task_source
        description: "Task source: TASKS.yaml entry name, user description, or issue URL (e.g., gh#42 or fj#12)"
      - name: repo
        description: "Target repository as owner/repo (e.g., ncrmro/catalyst)"
      - name: agent
        description: "Agent to assign: claude, gemini, opencode, or claude-local"
    outputs:
      task_md:
        type: file
        description: "TASK.md written to worktree root with frontmatter and acceptance criteria"
        required: true
    dependencies: []
    reviews:
      - run_each: task_md
        quality_criteria:
          "Clear Acceptance Criteria": "TASK.md has specific, testable acceptance criteria as checkboxes."
          "Valid Frontmatter": "TASK.md has valid YAML frontmatter with repo, branch, agent, platform, task_type, status, and created fields."
          "Scoped Description": "The description is focused on what needs to change and why — no scope creep."
          "Draft PR Created": "A draft PR was created (GitHub: --draft, Forgejo: WIP: prefix) with Goal/Tasks/Changes/Demo sections."
          "Worktree Setup": "A git worktree was created at the standard worktree path with the correct branch."

  - id: assign
    name: "Launch Agent"
    description: >
      Launch a coding agent in the worktree via agentctl. The agent reads TASK.md,
      implements the task, and commits work. Record run metadata in run.md.
    instructions_file: steps/assign.md
    inputs:
      - file: task_md
        from_step: plan
    outputs:
      run_md:
        type: file
        description: "Run metadata at .deepwork/tmp/sweng/run.md with agent info, worktree path, and launch command"
        required: true
    dependencies:
      - plan
    reviews:
      - run_each: run_md
        quality_criteria:
          "Agent Launched": "run.md confirms the agent was launched via agentctl with correct parameters."
          "TASK.md Present": "TASK.md was present in the worktree before agent launch."
          "Status Updated": "TASK.md status was updated to assigned."

  - id: pull_request_update
    name: "Update PR with Demo Evidence"
    description: >
      Run screenshot tests (if available), post visual evidence on the PR,
      and update the PR Demo section before review begins. Handles private
      repo image hosting via draft release assets.
    instructions_file: steps/pull_request_update.md
    inputs:
      - file: run_md
        from_step: assign
    outputs:
      pull_request_update_md:
        type: file
        description: "PR update summary at .deepwork/tmp/sweng/pull_request_update.md with evidence of screenshots posted and demo section updated"
        required: true
    dependencies:
      - assign
    reviews:
      - run_each: pull_request_update_md
        quality_criteria:
          "Demo Section Updated": "PR body has a Demo section with concrete evidence (screenshots, test results, or preview URLs)."
          "Screenshots Posted": "If the project has screenshot tests, they were run, committed, and embedded in the PR body's Demo section (not as a separate comment). Private repos use draft release assets, not raw.githubusercontent.com."

  - id: review
    name: "Review and Merge"
    description: >
      Collect agent results from worktree. Review diff against TASK.md acceptance
      criteria. Push changes. CI gate. Request review (GitHub: Copilot, Forgejo:
      repo owner). Auto-merge on PASS (squash). Max 3 fix attempts on FAIL.
    instructions_file: steps/review.md
    inputs:
      - file: pull_request_update_md
        from_step: pull_request_update
    outputs:
      review_md:
        type: file
        description: "Review document at .deepwork/tmp/sweng/review.md with verdict, evidence, and merge status"
        required: true
    dependencies:
      - pull_request_update
    reviews:
      - run_each: review_md
        additional_review_guidance: >
          Read the TASK.md from the worktree to verify each acceptance criterion was checked.
          Verify scope: every changed file and hunk in the diff must trace back to a specific
          acceptance criterion. Flag any cosmetic reformatting, refactoring, or additions not
          required by the task.
        quality_criteria:
          "Requirements Checked": "The review verifies each acceptance criterion from TASK.md."
          "Scope Validated": "The review confirms ALL changes are in-scope. Out-of-scope changes are flagged as FAIL."
          "Clear Verdict": "The review states PASS or FAIL with rationale."
          "CI Gated": "CI was checked to completion (GitHub: gh pr checks --watch, Forgejo: commit status poll)."
          "Deploy Preview Verified": "If the project has deploy previews (Cloudflare Workers, Vercel, Netlify), the deployed preview was checked, changes verified, and the PR Demo section updated with preview URL and verification evidence."
          "Auto-Merge Used": "For PASS, squash merge was used (GitHub: --auto --squash, Forgejo: fj pr merge --method squash)."

  - id: postflight
    name: "Clean Up"
    description: >
      Remove worktree and local branch for merged task. Update TASKS.yaml status
      to completed. Clean up temporary workflow files.
    instructions_file: steps/postflight.md
    inputs:
      - file: review_md
        from_step: review
    outputs:
      tasks_yaml:
        type: file
        description: "Updated TASKS.yaml with task status set to completed"
        required: true
    dependencies:
      - review
    reviews: []

  - id: audit
    name: "Dev Environment Audit"
    description: >
      Audit a repository's development environment against keystone conventions.
      Check devshell setup (flake.nix, .envrc, direnv), git conventions (.gitignore,
      CODEOWNERS, commit format), TDD infrastructure, and CI pipeline health.
      Defaults to current repo; accepts optional target repo path.
    instructions_file: steps/audit.md
    exposed: true
    inputs:
      - name: repo_path
        description: "Path to the repository to audit (defaults to current working directory if omitted)"
    outputs:
      audit_report.md:
        type: file
        description: "Audit report with pass/fail for each convention check, findings, and remediation steps"
        required: true
    dependencies: []
    reviews:
      - run_each: audit_report.md
        quality_criteria:
          "Devshell Checked": "The audit verifies flake.nix exists, builds successfully (nix develop --command true), .envrc has 'use flake', and .direnv/ is gitignored."
          "Git Conventions Checked": "The audit verifies .gitignore covers common artifacts, CODEOWNERS exists, and recent commits follow conventional commit format."
          "TDD Path Verified": "The audit confirms test infrastructure exists (test runner, test directory), tests can be executed, and the repo supports the TDD commit pattern."
          "CI Pipeline Verified": "The audit confirms CI config exists (.github/workflows/ or .forgejo/workflows/), the pipeline is functional, and checks are configured on PRs."
          "Actionable Findings": "Each finding includes a clear remediation step — not just 'X is missing' but 'create X with Y content'."
