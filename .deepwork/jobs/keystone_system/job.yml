name: keystone_system
version: "1.8.0"
summary: "Keystone development lifecycle: worktree, build, review, merge, deploy, validate, update, and convention management"
common_job_info_provided_to_all_steps_at_runtime: |
  Keystone is a NixOS-based infrastructure platform. Development follows a strict
  worktree-based workflow to keep the main branch always deployable.

  ## Convention: All work happens in worktrees

  Changes are NEVER made directly on main. Every change goes through:
  1. Create a git worktree branch off main
  2. Implement changes in the worktree
  3. Run DeepWork reviews (.deepreview rules) and fix findings
  4. Build to verify nix evaluation passes
  5. Merge the worktree branch into main
  6. Human runs `ks update --lock` in nixos-config to lock the new keystone rev
  7. Validate ALL hosts in the system with `ks doctor`

  **Exception**: The `convention` workflow commits directly to main because conventions
  are documentation files that do not require Nix builds or multi-host deploys.

  **Exception**: The `update` workflow is for catching up — getting the fleet to a fully locked,
  fully built state ready for `ks update --lock`. It surveys the gap between what's locked in
  nixos-config and what's on keystone main, triages issues, applies quick fixes, runs preflight
  builds for all hosts, then hands off to the human for the final `ks update --lock` and validates.

  ## Two-repo model

  - **keystone** — the NixOS module library (this repo). Worktree branches are created here.
  - **nixos-config** — the per-deployment configuration that imports keystone as a flake input.
    `ks update --lock` pulls the latest keystone main, locks flake.lock, builds, and deploys.

  ## Fast path vs full system

  During development, use `ks build` (home-manager only, no sudo) for fast iteration.
  This catches most evaluation errors and is sufficient for iterating on terminal/desktop
  module changes. However, the final deploy MUST always be `ks update --lock` which does
  a full system build + lock + deploy. Never consider a change complete until it has been
  through the full system path.

  ## Multi-host fleet

  Keystone manages multiple hosts (workstation, server, etc.) connected via Tailscale.
  After deploying to the current host, the validate step must check whether other hosts
  also need updating (e.g., if keystone module changes affect server services). Use
  `ks doctor` and the hosts table from `hosts.nix` to determine which hosts need attention.
  All hosts must be nominal before the workflow is complete.

  ## Key commands

  - `nix flake check --no-build` — fast evaluation check (catches type errors, missing imports)
  - `ks build` — build home-manager profiles only (fast, no sudo)
  - `ks build --lock` — full system build + lock + push
  - `ks update` — pull, build, deploy current host (requires sudo)
  - `ks update --lock` — pull, lock, build, push, deploy (requires sudo, human-only)
  - `ks doctor` — **AI entrypoint only** — this launches the `/ks.doctor` slash command (spawns a new model session). NEVER call `ks doctor` as a shell command inside a workflow step — use `systemctl --failed` and `journalctl -p err` for direct health checks instead.

  ## Iterative loop rules

  If the build step fails, loop back to implement to fix the issue.
  If validation finds problems after deploy, create a new worktree and loop back to plan.
  DeepWork review findings are fixed in-place in the worktree before proceeding.

  ## Convention system

  Conventions live in `conventions/` as RFC 2119 markdown files. Each convention follows
  a strict format: `{prefix}.{topic}.md` with prefixes `process`, `tool`, `code`, or `os`.
  Conventions are wired into agent archetypes via `conventions/archetypes.yaml` — either
  as `inlined_conventions` (always in context) or `referenced_conventions` (on-demand).

  The AGENTS.md in CLAUDE.md is generated from archetypes.yaml by the Nix build
  (`modules/terminal/conventions.nix`). After modifying archetypes.yaml, a `ks build`
  or `ks update` regenerates the instruction files.

  Key files:
  - `conventions/*.md` — convention documents
  - `conventions/archetypes.yaml` — maps conventions to agent archetypes and roles
  - `conventions/AGENTS.md` — meta-conventions for editing the conventions repo itself
  - `modules/terminal/conventions.nix` — Nix module that generates CLI tool instruction files

workflows:
  - name: develop
    summary: "Full keystone development lifecycle from plan through validated multi-host deployment"
    steps:
      - plan
      - implement
      - review
      - build
      - merge
      - deploy
      - validate

  - name: issue
    summary: "Write a keystone spec/issue with RFC 2119 requirements, user story, and architecture diagrams"
    steps:
      - write_issue

  - name: doctor
    summary: "Check all hosts are nominal — survey fleet state, then validate via direct shell health checks"
    steps:
      - survey_fleet
      - validate

  - name: convention
    summary: "Create or update a convention: draft, cross-reference, deduplicate, wire archetypes, commit to main"
    steps:
      - draft_convention
      - cross_reference
      - apply_convention
      - commit_convention

  - name: update
    summary: "Deploy pending keystone changes to fleet: survey, triage, fix, build, ks update --lock, validate"
    steps:
      - survey_fleet
      - plan_update
      - execute_fixes
      - preflight_build
      - run_update
      - validate

steps:
  - id: plan
    name: "Plan"
    description: "Create a worktree and produce an implementation plan from the user's goal"
    instructions_file: steps/plan.md
    inputs:
      - name: goal
        description: "What to implement — a feature description, bug report, or refactor goal"
    outputs:
      plan.md:
        type: file
        description: "Implementation plan with steps, files to change, and acceptance criteria"
        required: true
    dependencies: []
    reviews:
      - run_each: plan.md
        quality_criteria:
          "Actionable Steps": "The plan has concrete, ordered implementation steps — not vague goals."
          "Files Identified": "The plan identifies specific files that will be created or modified."
          "Acceptance Criteria": "The plan includes clear criteria for when the work is done."

  - id: implement
    name: "Implement"
    description: "Execute the plan in the worktree — write code, commit changes"
    instructions_file: steps/implement.md
    inputs:
      - file: plan.md
        from_step: plan
    outputs:
      implementation_summary.md:
        type: file
        description: "Summary of changes made: files modified, commits created, decisions taken"
        required: true
    dependencies:
      - plan
    reviews:
      - run_each: implementation_summary.md
        additional_review_guidance: "Read the plan.md file from the plan step to verify all planned steps were addressed."
        quality_criteria:
          "Plan Coverage": "All steps from the implementation plan are addressed — none are silently skipped."
          "Commit Discipline": "Changes are committed with conventional commit messages and logical grouping."
          "No Unrelated Changes": "The implementation stays focused on the plan — no scope creep or drive-by fixes."

  - id: review
    name: "Review"
    description: "Run DeepWork .deepreview rules on the worktree changes and fix all findings"
    instructions_file: steps/review.md
    inputs:
      - file: implementation_summary.md
        from_step: implement
    outputs:
      review_report.md:
        type: file
        description: "Review results — findings addressed, findings skipped with justification"
        required: true
    dependencies:
      - implement
    reviews:
      - run_each: review_report.md
        quality_criteria:
          "All Findings Addressed": "Every review finding is either fixed or has a documented justification for skipping."

  - id: build
    name: "Build"
    description: "Verify nix evaluation and build pass — fast path with ks build, full check with nix flake check"
    instructions_file: steps/build.md
    inputs:
      - file: review_report.md
        from_step: review
    outputs:
      build_result.md:
        type: file
        description: "Build output — success confirmation or failure details with loop-back decision"
        required: true
    dependencies:
      - review
    reviews:
      - run_each: build_result.md
        quality_criteria:
          "Build Clean": "Both nix flake check and ks build completed without errors."

  - id: merge
    name: "Merge"
    description: "Merge the worktree branch into keystone main and push"
    instructions_file: steps/merge.md
    inputs:
      - file: build_result.md
        from_step: build
    outputs:
      merge_result.md:
        type: file
        description: "Merge confirmation — branch name, commit hash on main, push status"
        required: true
    dependencies:
      - build
    reviews:
      - run_each: merge_result.md
        quality_criteria:
          "Clean Merge": "The merge completed without conflicts and the branch was pushed to origin/main."

  - id: deploy
    name: "Deploy"
    description: "Human-in-the-loop: user runs ks update --lock for full system build and deployment"
    instructions_file: steps/deploy.md
    inputs:
      - file: merge_result.md
        from_step: merge
    outputs:
      deploy_result.md:
        type: file
        description: "Deployment confirmation — ks update --lock output, build success, any warnings"
        required: true
    dependencies:
      - merge
    reviews: []

  - id: validate
    name: "Validate"
    description: "Check all hosts are nominal via direct shell health checks (systemctl, journalctl, agentctl)"
    instructions_file: steps/validate.md
    exposed: true
    inputs: []
    outputs:
      validation_report.md:
        type: file
        description: "Validation results — per-host ks doctor output, fleet health status, issues found"
        required: true
    dependencies:
      - deploy
    reviews:
      - run_each: validation_report.md
        quality_criteria:
          "Current Host Nominal": "Direct health checks on the current host (`systemctl --failed`, `journalctl -p err`) show no critical issues."
          "Fleet Checked": "All hosts affected by the changes have been checked or confirmed not impacted."
          "Changes Verified": "The specific changes from the plan are confirmed working on the live system."
          "Agent Detail": "Each configured agent's task queue, recent jobs, and any blocking issues are reported — not just service running status."
          "Issues Tracked": "Every issue found is cross-referenced against GitHub (ncrmro/keystone and ncrmro/nixos-config) — existing issues are linked, new issues are flagged for creation."
          "Archived to Notes": "A dated fleet health note has been written to ~/notes/ via zk new — personal deployment data must not remain only in the keystone open-source repo."

  - id: survey_fleet
    name: "Survey Fleet"
    description: "Gather fleet state: keystone rev gap, recent commits since last lock, direct host health checks"
    instructions_file: steps/survey_fleet.md
    inputs: []
    outputs:
      fleet_survey.md:
        type: file
        description: "Fleet state report: current vs latest keystone rev, commit changelog, per-host health, reachability"
        required: true
    dependencies: []
    reviews:
      - run_each: fleet_survey.md
        quality_criteria:
          "Rev Gap Documented": "The report shows the exact keystone commit currently locked in flake.lock and the latest commit on keystone main, with the full commit log between them."
          "Host Reachability": "All hosts in hosts.nix are listed with their reachability status — unreachable hosts are noted, not silently skipped."
          "Preliminary Health": "Direct health checks (`systemctl --failed`, `journalctl -p err`) were run on the current host and any issues are documented."

  - id: plan_update
    name: "Plan Update"
    description: "Analyze survey, triage changes into verify-only / ad-hoc-fix / needs-issue, produce update plan"
    instructions_file: steps/plan_update.md
    inputs:
      - file: fleet_survey.md
        from_step: survey_fleet
    outputs:
      update_plan.md:
        type: file
        description: "Update plan: triaged changes, verification checklist, issues to file, fixes to apply"
        required: true
    dependencies:
      - survey_fleet
    reviews:
      - run_each: update_plan.md
        additional_review_guidance: "Read the fleet_survey.md from the previous step to verify that all commits in the gap are accounted for in the triage."
        quality_criteria:
          "Complete Triage": "Every commit in the keystone rev gap is classified as verify-only, ad-hoc-fix, or needs-issue — none are unaccounted for."
          "Verification Checklist": "The plan includes a concrete checklist of things to verify after deployment, derived from the changes."
          "Issue Criteria": "Items marked needs-issue have clear justification for why they can't be fixed ad-hoc (scope, risk, or complexity)."

  - id: execute_fixes
    name: "Execute Fixes"
    description: "Apply ad-hoc fixes in worktrees, file ks.issues for big items, commit and push"
    instructions_file: steps/execute_fixes.md
    inputs:
      - file: update_plan.md
        from_step: plan_update
    outputs:
      fixes_report.md:
        type: file
        description: "Report of fixes applied, issues filed, and any remaining blockers before deployment"
        required: true
    dependencies:
      - plan_update
    reviews:
      - run_each: fixes_report.md
        additional_review_guidance: "Read the update_plan.md to verify all ad-hoc-fix items were addressed and all needs-issue items have issue URLs."
        quality_criteria:
          "All Ad-Hoc Fixes Applied": "Every item marked ad-hoc-fix in the plan is resolved — committed and pushed to keystone main."
          "Issues Filed": "Every item marked needs-issue has a GitHub issue URL linked in the report."
          "No Blockers": "Any remaining blockers that would prevent ks update --lock from succeeding are documented with mitigation steps."

  - id: preflight_build
    name: "Preflight Build"
    description: "Run ks build for all target hosts to catch eval errors before the human deploys"
    instructions_file: steps/preflight_build.md
    inputs:
      - file: update_plan.md
        from_step: plan_update
      - file: fixes_report.md
        from_step: execute_fixes
    outputs:
      build_result.md:
        type: file
        description: "Build results per host — success/failure, errors, warnings"
        required: true
    dependencies:
      - plan_update
      - execute_fixes
    reviews:
      - run_each: build_result.md
        quality_criteria:
          "All Target Hosts Built": "Every reachable host from the deployment plan was built — none were silently skipped."
          "Build Clean": "All hosts build successfully, or failures are documented with error details."

  - id: run_update
    name: "Run Update"
    description: "Human-in-the-loop: user runs ks update --lock to deploy all pending changes to the fleet"
    instructions_file: steps/run_update.md
    inputs:
      - file: build_result.md
        from_step: preflight_build
    outputs:
      update_result.md:
        type: file
        description: "Deployment result: ks update --lock output per host, build status, any errors or warnings"
        required: true
    dependencies:
      - preflight_build
    reviews: []

  - id: write_issue
    name: "Write Issue"
    description: "Write a keystone spec with RFC 2119 requirements, user story, and ASCII architecture diagrams"
    instructions_file: steps/write_issue.md
    exposed: true
    inputs:
      - name: feature_description
        description: "What feature or bug to spec — a sentence or paragraph describing the need"
    outputs:
      requirements.md:
        type: file
        description: "Complete keystone spec with RFC 2119 requirements, user story, affected modules, and diagrams"
        required: true
    dependencies: []
    reviews:
      - run_each: requirements.md
        additional_review_guidance: "Read existing specs in specs/ for format consistency. Check specs/REQ-019-ks-cli/requirements.md as the most recent example."
        quality_criteria:
          "RFC 2119 Language": "Requirements use RFC 2119 keywords (MUST, SHOULD, MAY) correctly and consistently."
          "Testable Requirements": "Each requirement is specific enough to verify — no vague 'should work well' statements."
          "Architecture Diagram": "At least one ASCII diagram illustrates the module architecture or data flow."
          "Affected Modules": "The spec identifies which keystone modules and files are affected."
          "User Story": "The spec includes a user story or motivation section explaining why this feature matters."

  - id: draft_convention
    name: "Draft Convention"
    description: "Gather requirements and draft a new convention in RFC 2119 format"
    instructions_file: steps/draft_convention.md
    exposed: true
    inputs:
      - name: convention_topic
        description: "What to codify — a topic description and optionally a draft with proposed rules"
    outputs:
      convention_draft.md:
        type: file
        description: "The drafted convention file in RFC 2119 format, ready for cross-referencing"
        required: true
    dependencies: []
    reviews:
      - run_each: convention_draft.md
        additional_review_guidance: "Read conventions/AGENTS.md for format rules (H1 title format, numbered rules, RFC 2119 keywords). Read 2-3 existing conventions in conventions/ to verify format consistency."
        quality_criteria:
          "RFC 2119 Format": "The convention follows the required format: H1 title as '# Convention: {Display Name} ({prefix.name})', numbered rules per section, RFC 2119 keywords used correctly."
          "Actionable Rules": "Every rule is specific and actionable — no vague aspirational statements like 'code should be clean'."
          "Logical Sections": "Rules are grouped into coherent sections with clear H2 headings."
          "Golden Example": "If the convention covers a pattern or tool with non-trivial usage, a golden example section demonstrates the rules applied to a realistic scenario."

  - id: cross_reference
    name: "Cross-Reference"
    description: "Scan all existing conventions for overlap, identify redundancies, and produce a deduplication plan"
    instructions_file: steps/cross_reference.md
    inputs:
      - file: convention_draft.md
        from_step: draft_convention
    outputs:
      cross_reference_report.md:
        type: file
        description: "Analysis of overlaps with existing conventions, redundant rules identified, and proposed changes (update, remove, add cross-refs)"
        required: true
    dependencies:
      - draft_convention
    reviews:
      - run_each: cross_reference_report.md
        additional_review_guidance: "Read the convention_draft.md from the previous step. Spot-check 2-3 of the referenced existing conventions to verify the overlap claims are accurate."
        quality_criteria:
          "Thorough Scan": "Every existing convention in conventions/ was considered — the report lists all files checked."
          "Accurate Overlaps": "Identified overlaps cite specific rule numbers from both the new draft and existing conventions."
          "Clear Action Plan": "Each overlap has a concrete resolution: keep in new convention, keep in existing, merge, or add cross-reference."

  - id: apply_convention
    name: "Apply Convention"
    description: "Write the convention file, update or remove redundant conventions, wire into archetypes.yaml"
    instructions_file: steps/apply_convention.md
    inputs:
      - file: convention_draft.md
        from_step: draft_convention
      - file: cross_reference_report.md
        from_step: cross_reference
    outputs:
      change_summary.md:
        type: file
        description: "Summary of all file changes: convention created, conventions updated/removed, archetypes.yaml modifications"
        required: true
    dependencies:
      - draft_convention
      - cross_reference
    reviews:
      - run_each: change_summary.md
        additional_review_guidance: "Read the cross_reference_report.md to verify all proposed changes were applied. Read conventions/archetypes.yaml to verify the new convention was wired correctly."
        quality_criteria:
          "Dedup Applied": "All redundancies identified in the cross-reference report are resolved — no duplicate rules remain across conventions."
          "Archetypes Wired": "The new convention appears in the appropriate archetypes (inlined or referenced) and roles in archetypes.yaml."
          "Cross-References Added": "Where conventions now reference each other (e.g., 'see code.shell-scripts'), the cross-references are bidirectional and accurate."
          "No Orphaned Rules": "Rules removed from existing conventions were either moved to the new convention or confirmed truly redundant — nothing was silently dropped."

  - id: commit_convention
    name: "Commit Convention"
    description: "Commit all convention changes to main and push to remote"
    instructions_file: steps/commit_convention.md
    inputs:
      - file: change_summary.md
        from_step: apply_convention
    outputs:
      commit_result.md:
        type: file
        description: "Commit confirmation — hash, files changed, push status"
        required: true
    dependencies:
      - apply_convention
    reviews:
      - run_each: commit_result.md
        quality_criteria:
          "Clean Commit": "The commit message follows conventional commits format (docs(conventions): ...) and accurately describes the changes."
          "Pushed to Remote": "The commit has been pushed to origin/main successfully."
          "Only Convention Files": "The commit contains only convention-related files (conventions/*.md, conventions/archetypes.yaml) — no unrelated changes."
