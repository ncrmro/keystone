name: project
version: "1.6.4"
summary: "Project onboarding, press releases, milestone planning, engineering handoff, success charter reviews, and health audits"
common_job_info_provided_to_all_steps_at_runtime: |
  This job covers the full project lifecycle from onboarding through engineering handoff:

  1. **Onboard** — Interactive onboarding for new projects: collect info, investigate repos/sites,
     build a structured profile. Projects can be commercial ventures, nonprofits, open-source
     efforts, or mission-focused initiatives.

  2. **Press Release** — Working-backwards press release in the Amazon tradition. The press release
     announces a product feature to customers AND scopes the development work required to deliver
     on the promise.

  3. **Milestone** — Creates or adopts a milestone for a project repo, starting from either a
     press release issue URL, an existing issue, or freehand notes. Refines raw content into
     properly formatted user stories, creates the milestone, and links the issue.
     Usually follows `project/press_release`.

  4. **Milestone Engineering Handoff** — The engineering response to a product milestone.
     Produces an internal FAQ (feasibility, architecture, cost, risk), conducts a document
     review with optional technical spikes, writes functional requirement specs, and creates
     a single plan issue tracking all implementation work. PRs are opened against the plan
     issue directly — no child issues. Implementation work flows through `engineer/implement`.

  5. **Success** — Define and review a project's mission, KPIs, charter, and goals across
     5 horizons (1 month, 6 month, 1 year, 5 year, 10 year). Produces a living charter doc
     and dated status reports with a verdict (accelerate/continue/pivot/pause/archive) plus
     confidence score. Serves as the backbone for prioritization and reality checks — keeps
     the human from losing the business thread while focused on engineering.

  6. **Doctor** — Audit a project's public presence and release coverage:
     - Checks the notes hub exists and contains website URL and social media accounts
     - Checks every release/pre-release has a corresponding published MDX post on the website
     - If the website repo has no blog/posts MDX infrastructure, files a GitHub/Forgejo issue
       to add it (assignable to Copilot / agents for implementation)
     - For each missing release post, files a separate issue on the website repo
     Run `project/doctor` after each release cycle to keep the public website in sync with
     the project's history.

  The complete project pipeline:
    1. project/press_release                 — working-backwards press release
    2. project/milestone                     — milestone + user stories (accepts press_release_issue_url)
    3. project/milestone_engineering_handoff — internal FAQ → document review → specs → plan issue
    4. engineer/implement                    — implementation task by task (one PR per task)

  After completing any project workflow, use `ks.notes` / `notes/process_inbox` to capture
  key decisions, risks, and learnings into personal notes and keep shared surfaces up to date.

  Key data files:
  - PROJECTS.yaml: Priority-ordered project list at repo root. New projects are appended
    at the end (lowest priority) unless the user specifies otherwise.
  - projects/{slug}/README.yaml: Structured project profile (the primary deliverable of onboard).
  - projects/{slug}/charter.md: Living project charter with mission, KPIs, and goals (success workflow).
  - projects/{slug}/reports/success_review_YYYY-MM.md: Dated success review reports.

  Agent access context:
  - Agents (drago, luce) need SSH access to repos. Check with `git ls-remote` or CLI tools.
  - Use `tea`/`fj` for Forgejo repos (git.ncrmro.com), `gh` for GitHub repos.
  - Use CLI tools first for repo investigation to save tokens.
  - Use Chrome MCP for all live public websites (HTTP 200) — take screenshot + snapshot
    to capture current state, messaging, and page status (live/demo/placeholder).

  Press release conventions:
  - The agent writing the press release MUST follow the conventions defined in
    `.agents/conventions/process.press-release.md` and adopt the role described in
    `.agents/roles/press-release-writer.md`. Read both files before drafting.
  - Write from the customer's perspective, not the builder's
  - Lead with customer benefit in headline and opening
  - Include problem paragraph before solution paragraph
  - Present tense, as if the product is already launched
  - Plain language — no jargon, buzzwords, or internal terminology
  - 300-500 words, succinct and semi-terse — current state, why, how, what
  - Do NOT include a fictional customer quote — no fabricated testimonials
  - Do NOT include a city dateline unless the user explicitly asks for one
  - Include a call to action
  - Claims must not exceed what the planned feature set can deliver
  - Internal metrics and implementation details must not appear
  - The local workflow artifact for a press release is staged under `.deepwork/tmp/`.
    Use a unique basename derived from the project slug or headline slug so repeated
    runs do not overwrite each other. If the project stores press releases in-repo,
    publish the finalized `.mdx` to the project's designated directory, typically
    `posts/press_releases/`, as a separate explicit step.
  - Before creating the issue, a permanent zk note MUST be created in `~/notes/notes/`
    containing the full press release content. The note MUST include `project/<slug>`,
    `source/agent`, and `source/deepwork` tags, plus `repo_ref` frontmatter. After the
    issue is created, the note MUST be updated with `issue_ref: gh:<owner>/<repo>#<number>`
    (or `fj:` for Forgejo). See `process.notes` and `tool.zk-notes` for the tagging standard.
  - After writing the press release, an issue MUST be created on the project's repo containing
    the full press release content. The issue body MUST present the user-facing press release as
    a Markdown blockquote, not plain pasted text. The full URL of this issue is a required output
    — downstream workflows (milestone/setup, etc.) link back to the press release via this URL.

  Downstream workflows this profile feeds into:
  - `project/milestone` — creates milestone and user stories from press release scope
  - Research workflows for competitive analysis, market research, technical research

  Lean Canvas fields collected during intake:
  - Problem (top 1-3 problems)
  - Customer Segments (target users)
  - Unique Value Proposition
  - Unfair Advantage (if any)
  - Key Metrics (how success is measured)
  - Additional fields are optional and can be filled in later.

  README.yaml structure should include:
  - name, slug, description, mission
  - domains (list of domain names)
  - repos (list of {url, platform, description})
  - lean_canvas (problem, customer_segments, unique_value_proposition, unfair_advantage, key_metrics)
  - riskiest_assumptions (list of assumptions ranked by risk)
  - recommended_next_steps (prioritized list of downstream workflows to run)
  - status, created_at

workflows:
  - name: onboard
    summary: "Interactive project onboarding from discovery through profile creation"
    steps:
      - gather_basics
      - investigate
      - build_profile
      - setup_repos

  - name: press_release
    summary: "Gather context and write a working-backwards press release"
    steps:
      - gather_context
      - write_press_release

  - name: milestone
    summary: "Parse press release or scope notes, refine user stories, create milestone, and link issue"
    steps:
      - gather_and_parse
      - refine_stories
      - setup_milestone

  - name: milestone_engineering_handoff
    summary: "Internal FAQ, document review, optional spikes, specs, and plan issue — full engineering gate before implementation"
    steps:
      - review_milestone
      - write_internal_faq
      - document_review
      - create_specs
      - create_plan_issue

  - name: success
    summary: "Define or review project charter, KPIs, goals, and produce a verdict with recommendations"
    steps:
      - assess_state
      - define_charter
      - reality_check
      - update_priorities

  - name: doctor
    summary: "Audit a project's health: hub note completeness, repo conventions, and release post coverage on the website"
    steps:
      - load_hub
      - audit_health
      - file_gaps

  - name: wrap_up
    summary: "Wind down engineering work — group uncommitted changes into logical commits, push, document in notes, and check in on open issues/PRs"
    steps:
      - scan_context
      - plan_commits
      - commit_and_document
      - continue_or_finish

steps:
  - id: gather_basics
    name: "Gather Project Basics"
    description: "Interactive conversation to collect project name, mission, domains, git repos, and lean canvas details"
    instructions_file: steps/gather_basics.md
    inputs:
      - name: project_name
        description: "The name of the project to onboard (may be approximate — the conversation will refine it)"
    outputs:
      intake_notes.md:
        type: file
        description: "Raw conversation summary capturing all gathered details: name, slug, mission, domains, repos, lean canvas answers, and any user stories mentioned"
        required: true
    dependencies: []
    reviews:
      - run_each: intake_notes.md
        quality_criteria:
          "Core Fields Captured": "The notes include project name, slug, mission/description, and at least one of: domain, git repo, or customer segment."
          "Lean Canvas Started": "At least 3 of the 5 lean canvas fields (problem, customer segments, UVP, unfair advantage, key metrics) have been discussed."
          "Riskiest Assumptions Identified": "The agent has identified or asked about the project's riskiest assumptions."

  - id: investigate
    name: "Investigate Repos and Websites"
    description: "Use CLI tools (tea/fj, gh, git ls-remote) to investigate repos, then Chrome MCP for public websites"
    instructions_file: steps/investigate.md
    inputs:
      - file: intake_notes.md
        from_step: gather_basics
    outputs:
      investigation_report.md:
        type: file
        description: "Findings from repo inspection (README, structure, languages, recent activity) and website review (screenshots, key pages)"
        required: true
    dependencies:
      - gather_basics
    reviews:
      - run_each: investigation_report.md
        additional_review_guidance: "Read intake_notes.md to verify all repos and domains mentioned were investigated."
        quality_criteria:
          "All Repos Checked": "Every git repo mentioned in intake_notes.md was checked for agent access (SSH clone or ls-remote) and basic structure."
          "CLI Before Browser": "Investigation used CLI tools (git, tea/fj, gh) for repo investigation before using Chrome MCP."
          "Access Status Clear": "For each repo, it is clear whether drago and luce agents have access (can clone/push). No 'untested' entries without explanation."
          "Website State Captured": "Every live website (HTTP 200) has a current state summary covering headline, positioning, key pages, and page states (live/demo/placeholder)."

  - id: build_profile
    name: "Build Project Profile"
    description: "Synthesize gathered info and investigation into projects/{slug}/README.yaml and update PROJECTS.yaml"
    instructions_file: steps/build_profile.md
    inputs:
      - file: intake_notes.md
        from_step: gather_basics
      - file: investigation_report.md
        from_step: investigate
    outputs:
      readme_yaml:
        type: file
        description: "The projects/{slug}/README.yaml structured profile document"
        required: true
      projects_yaml:
        type: file
        description: "Updated PROJECTS.yaml with the new project entry appended"
        required: true
    dependencies:
      - gather_basics
      - investigate
    reviews:
      - run_each: readme_yaml
        additional_review_guidance: "Read intake_notes.md and investigation_report.md to verify the profile accurately reflects gathered information."
        quality_criteria:
          "Complete Structure": "README.yaml includes all required fields: name, slug, description, mission, repos, lean_canvas, riskiest_assumptions, recommended_next_steps, status, created_at."
          "Assumptions Prioritized": "Riskiest assumptions are listed and ranked, with recommended next steps aligned to validating the highest-risk assumptions first."
          "Valid YAML": "The file is valid YAML with no syntax errors."
      - run_each: projects_yaml
        quality_criteria:
          "Project Added": "The new project appears in PROJECTS.yaml with name, description, status, and priority fields."
          "Existing Projects Preserved": "All previously existing projects remain unchanged in PROJECTS.yaml."

  - id: setup_repos
    name: "Setup Repositories"
    description: "Create any repos that don't exist yet (asking user where), ensure agent SSH access"
    instructions_file: steps/setup_repos.md
    inputs:
      - file: readme_yaml
        from_step: build_profile
      - file: investigation_report.md
        from_step: investigate
    outputs:
      setup_confirmation.md:
        type: file
        description: "Confirmation of repo setup actions taken: repos created, access verified, or skipped if all repos already existed"
        required: true
    dependencies:
      - build_profile
      - investigate
    reviews: []

  - id: gather_context
    name: "Gather Context"
    description: "Research the project and frame the customer problem, solution, and value proposition"
    instructions_file: steps/gather_context.md
    inputs:
      - name: project_name
        description: "The name of the project or product this feature belongs to"
      - name: feature_brief
        description: "What the feature does and how it furthers the project's business or mission"
    outputs:
      context_brief.md:
        type: file
        description: "Structured brief with customer segment, problem, solution framing, and key claims"
        required: true
    dependencies: []
    reviews:
      - run_each: context_brief.md
        quality_criteria:
          "Customer Identified": "The brief clearly identifies a specific customer segment and their needs."
          "Problem-Solution Framing": "The problem is stated before the solution, and both are concrete — not vague or generic."
          "Scoping Value": "The brief implies what must be built to deliver on the promise, providing development scoping value."

  - id: write_press_release
    name: "Write Press Release"
    description: "Draft the press release following process.press-release convention"
    instructions_file: steps/write_press_release.md
    inputs:
      - file: context_brief.md
        from_step: gather_context
    outputs:
      press_release.mdx:
        type: file
        description: "The finished working-backwards press release in MDX format"
        required: true
      press_release_issue_url.md:
        type: file
        description: "Full URL of the issue created for the press release (for traceability and downstream workflow linking)"
        required: true
    dependencies:
      - gather_context
    reviews:
      - run_each: press_release.mdx
        additional_review_guidance: "Read `.agents/conventions/process.press-release.md` for the full convention rules, and the `context_brief.md` file for the intended framing."
        quality_criteria:
          "Customer-First Framing": "The headline and opening paragraph state the customer benefit, not the feature name."
          "Working Backwards Structure": "Body follows current state → why → how → what flow, written in present tense."
          "Succinct and Terse": "300-500 words, no filler or verbose marketing prose. Each section is 1-3 sentences."
          "Plain Language": "No jargon, buzzwords, or internal terminology — a non-technical reader can understand it."
          "Scoping Clarity": "The press release clearly implies what must be built to deliver the promise."
          "ASCII Art Mockup": "For products with a UI, an ASCII art mockup shows the product in use with realistic data."
          "No Quotes or City": "No fictional customer quotes. No city dateline (unless user explicitly requested)."
          "Unique Local Artifact Path": "The local `.deepwork/tmp/` artifact path uses a unique topic-derived basename rather than a shared generic filename."
      - run_each: press_release_issue_url.md
        quality_criteria:
          "Full URL Present": "The file contains a full URL (starting with https://) pointing to the issue that holds the press release."
          "Issue Accessible": "The URL points to an actual issue on GitHub or Forgejo, not a file path or placeholder."
          "Quoted Press Release": "The published issue body presents the user-facing press release inside a Markdown blockquote."

  - id: gather_and_parse
    name: "Gather and Parse Input"
    description: "Read an existing issue or accept freehand notes and extract raw scope. Optionally fetches press release content from a press_release_issue_url."
    instructions_file: steps/gather_and_parse.md
    inputs:
      - name: project_repo
        description: "Repo slug (owner/repo) and platform (github or forgejo) where the milestone will live"
      - name: issue_number
        description: "Issue number or URL to use as the starting point (leave blank if providing freehand notes)"
      - name: freehand_notes
        description: "Freehand scope notes if no existing issue (leave blank if using an existing issue)"
      - name: press_release_issue_url
        description: "Full URL of the press release issue created by project/press_release — embed in milestone issue body if provided (optional)"
    outputs:
      raw_scope.md:
        type: file
        description: "Extracted raw scope content from the issue body or freehand notes, with source metadata and press release content if provided"
        required: true
    dependencies: []
    reviews:
      - run_each: raw_scope.md
        quality_criteria:
          "Source Captured": "The raw scope includes the full original content without omissions."
          "Metadata Present": "The file includes metadata about the source (issue number/URL, repo, platform) or notes that input was freehand."
          "Press Release Captured": "If press_release_issue_url was provided, the press release content is recorded under a '## Press Release' heading."

  - id: refine_stories
    name: "Refine User Stories"
    description: "Transform raw scope into properly formatted user stories with acceptance criteria"
    instructions_file: steps/refine_stories.md
    inputs:
      - file: raw_scope.md
        from_step: gather_and_parse
    outputs:
      refined_stories.md:
        type: file
        description: "User stories in standard format with acceptance criteria, priority tags, and ownership labels"
        required: true
      milestone_title.md:
        type: file
        description: "Auto-generated milestone title derived from the scope content"
        required: true
    dependencies:
      - gather_and_parse
    reviews:
      - run_each: refined_stories.md
        additional_review_guidance: "Read the raw_scope.md from the previous step to verify all scope items are covered."
        quality_criteria:
          "Full Coverage": "Every distinct scope item from the raw input maps to at least one user story."
          "Standard Format": "Each story follows: As a [persona], I want [action], so that [benefit] — with a checklist of acceptance criteria."
          "Ownership Tagged": "Each story is tagged as product or engineering with a logical distinction."
          "Priority Assigned": "Each story has a priority tag (high / medium / low)."

  - id: setup_milestone
    name: "Set Up Milestone and Link Issue"
    description: "Check for existing milestone, create if needed, update issue body, and link issue to milestone"
    instructions_file: steps/setup_milestone.md
    inputs:
      - file: refined_stories.md
        from_step: refine_stories
      - file: milestone_title.md
        from_step: refine_stories
      - name: project_repo
        description: "Repo slug (owner/repo) and platform (github or forgejo)"
      - name: issue_number
        description: "Issue number to update (blank if a new issue should be created)"
    outputs:
      setup_report.md:
        type: file
        description: "Summary of created/found milestone, issue number, URLs, and what was updated"
        required: true
    dependencies:
      - refine_stories
    reviews:
      - run_each: setup_report.md
        additional_review_guidance: "Read the refined_stories.md to verify the issue body contains all refined stories."
        quality_criteria:
          "Milestone Exists": "A milestone was found or created and its title and URL are recorded."
          "Issue Linked": "The issue is associated with the milestone."
          "Issue Body Updated": "The issue body was updated with the refined user stories in standard format."
          "Labels Applied": "The product label is on the issue."
          "Report Complete": "The report includes milestone title, issue number, and URLs."
          "Press Release Embedded": "If a press release issue URL was provided in gather_and_parse, the full press release text is embedded in the issue body under a '## Press Release' heading — not as a link or vault path."
          "Milestone Description Short": "The milestone description is a short summary (2-3 sentences), not a wall of text."
          "Milestone Description Motivating": "The milestone description includes both WHY (the problem or motivation) and WHAT (the deliverable) — not just a feature label."

  - id: review_milestone
    name: "Review Milestone and Analyze Scope"
    description: "Fetch the milestone issue, analyze the codebase, and map user stories to systems"
    instructions_file: steps/review_milestone.md
    inputs:
      - name: project_repo
        description: "Repo slug (owner/repo) and platform (github or forgejo)"
      - name: milestone_issue_number
        description: "The milestone's consolidated user stories issue number (must already exist)"
    outputs:
      scope_analysis.md:
        type: file
        description: "Systems map, affected files/modules, shared boundaries, prerequisites, and ambiguity flags"
        required: true
    dependencies: []
    reviews:
      - run_each: scope_analysis.md
        quality_criteria:
          "Full Story Coverage": "Every user story from the milestone issue is analyzed and mapped to affected codebase files or modules."
          "Codebase Grounding": "References actual files and directories in the project repository, not hypothetical or generic paths."
          "Boundary Identification": "Shared system boundaries across stories are identified and documented."
          "Gap Detection": "Implied prerequisites not explicitly listed in the user stories are identified and flagged."

  - id: write_internal_faq
    name: "Write Internal FAQ"
    description: "Engineering reality check — answer feasibility, architecture, cost/effort, and risk questions for every user story. Produce a summary verdict and list required spikes."
    instructions_file: steps/write_internal_faq.md
    inputs:
      - file: scope_analysis.md
        from_step: review_milestone
    outputs:
      internal_faq.md:
        type: file
        description: "Per-story feasibility/architecture/cost/risk analysis, required spikes list, and summary verdict (green/yellow/red)"
        required: true
    dependencies:
      - review_milestone
    reviews:
      - run_each: internal_faq.md
        quality_criteria:
          "Full Story Coverage": "Every user story from the scope analysis has a feasibility, architecture, cost/effort, and risk answer."
          "T-shirt Sizing Concrete": "Every story has a T-shirt size (XS/S/M/L/XL) with a written justification — no 'TBD' entries."
          "Spikes Identified": "Any stories relying on novel or unproven technology have a corresponding spike entry with a clear blocking question."
          "Verdict Stated": "The document opens with a summary verdict of green, yellow, or red with supporting rationale."
          "Posted as Comment": "The internal FAQ was posted as a comment on the milestone issue."

  - id: document_review
    name: "Document Review"
    description: "Crucible — present internal FAQ, run required spikes via spike/spike, negotiate scope to MVP, and produce a binding review decision green-lighting the agreed scope for specs."
    instructions_file: steps/document_review.md
    inputs:
      - file: internal_faq.md
        from_step: write_internal_faq
      - file: scope_analysis.md
        from_step: review_milestone
    outputs:
      review_decision.md:
        type: file
        description: "Binding scope decision: in-scope stories, deferred stretch goals, renegotiated stories, spike findings, and explicit green-light for specs"
        required: true
    dependencies:
      - write_internal_faq
      - review_milestone
    reviews:
      - run_each: review_decision.md
        additional_review_guidance: "Read internal_faq.md to verify all required spikes were completed and all red/yellow items were resolved before the green-light."
        quality_criteria:
          "Spikes Completed": "If the internal FAQ listed required spikes, each spike's findings are documented in the review decision."
          "Stories Categorized": "Every story is explicitly categorized as in scope, deferred, or renegotiated — no uncategorized stories."
          "Renegotiations Documented": "For each renegotiated story, the original promise, the revised scope, and the technical constraint are recorded."
          "Milestone Issue Updated": "The milestone issue body was updated to reflect the negotiated scope."
          "Green-lit": "The document ends with an explicit 'Green-lit for specs' statement."

  - id: create_specs
    name: "Create Functional Requirement Specs"
    description: "Write spec files grouped by system boundary with behavioral requirements and data contracts, covering only approved MVP scope from the review decision"
    instructions_file: steps/create_specs.md
    inputs:
      - file: scope_analysis.md
        from_step: review_milestone
      - file: review_decision.md
        from_step: document_review
      - name: project_repo
        description: "Repo slug (owner/repo) and platform (github or forgejo)"
      - name: milestone_issue_number
        description: "The milestone's consolidated user stories issue number"
    outputs:
      specs_pr_report.md:
        type: file
        description: "Report of created spec files and the draft PR with links"
        required: true
    dependencies:
      - review_milestone
      - document_review
    reviews:
      - run_each: specs_pr_report.md
        additional_review_guidance: "Read the scope_analysis.md and review_decision.md to verify all approved system boundaries are covered by specs and deferred stories are excluded."
        quality_criteria:
          "Full Boundary Coverage": "Every system boundary for approved stories has a corresponding spec file."
          "Behavioral Requirements": "Specs use RFC 2119 keywords (MUST, SHOULD, MAY) for behavioral requirements."
          "Data Contracts": "API contracts, data models, or interface definitions are specified where applicable."
          "PR Created": "A draft PR has been created with the spec files and assigned to reviewers."
          "Edge Cases": "Edge cases and error handling are documented in each spec."
          "Approved Scope Only": "No specs were written for deferred stories from the review decision."

  - id: create_plan_issue
    name: "Create Implementation Plan Issue"
    description: "Create a single plan issue that tracks all milestone work — with task checklist, parallelism notes, and blocking dependencies. PRs are opened against this issue directly."
    instructions_file: steps/create_plan_issue.md
    inputs:
      - file: scope_analysis.md
        from_step: review_milestone
      - file: review_decision.md
        from_step: document_review
      - file: specs_pr_report.md
        from_step: create_specs
      - name: project_repo
        description: "Repo slug (owner/repo) and platform (github or forgejo)"
      - name: milestone_issue_number
        description: "The milestone's consolidated user stories issue number"
    outputs:
      plan_issue_report.md:
        type: file
        description: "Report of the created plan issue with number, URL, and content summary"
        required: true
    dependencies:
      - review_milestone
      - document_review
      - create_specs
    reviews:
      - run_each: plan_issue_report.md
        additional_review_guidance: "Read scope_analysis.md, review_decision.md, and specs_pr_report.md to verify the plan covers all approved stories. Verify that NO child issues were created — all work is tracked in the single plan issue's task checklist."
        quality_criteria:
          "Single Issue": "Only ONE plan issue was created. No child issues exist."
          "Task Checklist": "The plan issue includes a phased task checklist with conventional commit prefixes (feat:, chore:, test:)."
          "Parallelism Documented": "The plan issue documents which tasks can be done in parallel and which are blocking."
          "Approved Stories Present": "Every approved story from the review decision appears in the plan with happy path requirements."
          "Test Expectations": "Each story includes red/green test expectations describing what fails before and passes after implementation."
          "Design Mockups": "ASCII art mockups are included for new UI components or layouts."
          "Demo Descriptions": "Expected demo artifacts are described for each story."
          "Specs Referenced": "The specs PR is referenced in the plan issue body."
          "Review Decision Referenced": "The review decision is referenced so implementers understand scope constraints."
          "Milestone Linked": "The plan issue is linked to the milestone."

  - id: assess_state
    name: "Assess Project State"
    description: "Gather current project state from README.yaml, milestones, recent activity, and existing charter"
    instructions_file: steps/assess_state.md
    inputs:
      - name: project_slug
        description: "The project slug (e.g., 'my-project') matching the directory under projects/"
    outputs:
      state_assessment.md:
        type: file
        description: "Current project state: milestone progress, recent activity, existing charter status, and raw data for the charter step"
        required: true
    dependencies: []
    reviews:
      - run_each: state_assessment.md
        quality_criteria:
          "Project Data Gathered": "The assessment includes data from README.yaml, PROJECTS.yaml, and any existing charter.md."
          "Milestone Progress": "Current milestone status (open/closed issues, completion %) is captured from the platform."
          "Activity Summary": "Recent git and issue activity is summarized to show momentum or stagnation."

  - id: define_charter
    name: "Define or Update Charter"
    description: "Interactive step to define or update mission, KPIs, and goals at 5 horizons (1mo/6mo/1yr/5yr/10yr)"
    instructions_file: steps/define_charter.md
    inputs:
      - file: state_assessment.md
        from_step: assess_state
    outputs:
      charter:
        type: file
        description: "The projects/{slug}/charter.md living document with mission, KPIs, and goals"
        required: true
    dependencies:
      - assess_state
    reviews:
      - run_each: charter
        additional_review_guidance: "Read state_assessment.md to verify the charter reflects current project reality and addresses any gaps identified."
        quality_criteria:
          "Mission Defined": "The charter includes a clear, concise mission statement that distinguishes this project from others."
          "KPIs Specified": "At least 3 business KPIs are defined with current values (or baselines) and target values."
          "All Horizons Covered": "Goals are defined for all 5 horizons: 1 month, 6 months, 1 year, 5 years, and 10 years."
          "Goals Are Measurable": "Each goal has concrete success criteria, not vague aspirations."

  - id: reality_check
    name: "Reality Check"
    description: "Compare current state against charter goals and KPIs, produce verdict with confidence score"
    instructions_file: steps/reality_check.md
    inputs:
      - file: state_assessment.md
        from_step: assess_state
      - file: charter
        from_step: define_charter
    outputs:
      success_review:
        type: file
        description: "Dated review report at projects/{slug}/reports/success_review_YYYY-MM.md with KPI scores, goal progress, and verdict"
        required: true
    dependencies:
      - assess_state
      - define_charter
    reviews:
      - run_each: success_review
        additional_review_guidance: "Read the charter file and state_assessment.md to verify the review accurately reflects progress against stated goals and KPIs."
        quality_criteria:
          "KPI Scoring": "Each KPI from the charter is scored against its target with current vs target values shown."
          "Goal Progress": "Each goal across all 5 horizons is assessed for on-track, at-risk, or off-track status."
          "Verdict Present": "A clear verdict (accelerate/continue/pivot/pause/archive) is stated with confidence level (high/medium/low)."
          "Business Thread Check": "The review flags if activity is skewed toward engineering at the expense of business goals."
          "Evidence-Based": "The verdict and confidence score are supported by specific data points, not gut feeling."

  - id: update_priorities
    name: "Update Priorities"
    description: "Based on the verdict, recommend next actions and priority adjustments"
    instructions_file: steps/update_priorities.md
    inputs:
      - file: success_review
        from_step: reality_check
      - file: charter
        from_step: define_charter
    outputs:
      priority_recommendations.md:
        type: file
        description: "Concrete next actions: workflows to run, milestones to create/close, PROJECTS.yaml priority changes"
        required: true
    dependencies:
      - reality_check
      - define_charter
    reviews:
      - run_each: priority_recommendations.md
        additional_review_guidance: "Read the success_review report and charter to verify recommendations are aligned with the verdict and goals."
        quality_criteria:
          "Verdict Aligned": "Recommendations directly follow from the verdict in the success review."
          "Actionable Items": "Each recommendation specifies a concrete action (which workflow to run, which milestone to create/close, what to change in PROJECTS.yaml)."
          "Prioritized": "Recommendations are ordered by impact and urgency."

  # ── doctor workflow steps ──────────────────────────────────────────────────

  - id: load_hub
    name: "Load Project Hub"
    description: "Find the project's index hub note via zk tags, extract repos, website URL, and social media accounts"
    instructions_file: steps/load_hub.md
    inputs:
      - name: project_name
        description: "Project name or tag (e.g. 'keystone', 'ks-systems') — used to find the hub note via zk list --tag index --tag <name>"
    outputs:
      hub_report.md:
        type: file
        description: "Structured hub summary: note path, hub fields present/missing (website_url, social_media, repos), list of repos with their platform and URL, and website repo if identified"
        required: true
    dependencies: []
    reviews:
      - run_each: hub_report.md
        quality_criteria:
          "Hub Note Found": "The report identifies the hub note path in ~/notes/index/."
          "Fields Audited": "The report records which of these are present or missing: website URL, social media handles, linked repos (repo_ref tags or repos: frontmatter)."
          "Repos Listed": "Every repo referenced in the hub (via tags, frontmatter, or body links) is listed with its platform (github/forgejo) and URL."
          "Website Repo Identified": "If any repo appears to be a website/web frontend, it is flagged as the website repo."

  - id: audit_health
    name: "Audit Repo and Release Health"
    description: "Run repo/doctor for each repo via parallel sub-agents, then check release post coverage against the website"
    instructions_file: steps/audit_health.md
    inputs:
      - file: hub_report.md
        from_step: load_hub
    outputs:
      health_report.md:
        type: file
        description: "Consolidated findings: repo/doctor results per repo, releases found vs posts published, and missing release posts list"
        required: true
    dependencies:
      - load_hub
    reviews:
      - run_each: health_report.md
        additional_review_guidance: "Read hub_report.md to verify all repos from the hub were checked."
        quality_criteria:
          "All Repos Checked": "Every repo from hub_report.md has a repo/doctor result or a clear explanation of why it was skipped."
          "Releases Enumerated": "All releases or tags in each source repo are listed with version, date, and title."
          "Post Coverage Mapped": "Each release is mapped to either a published MDX post (with path) or marked as missing."
          "Blog Infrastructure Status": "For each website repo, it is recorded whether a blog/posts MDX infrastructure exists (e.g. src/content/posts/)."

  - id: file_gaps
    name: "File Issues for Gaps"
    description: "For each gap found, file a GitHub/Forgejo issue: missing blog infrastructure, missing release posts, missing hub fields"
    instructions_file: steps/file_gaps.md
    inputs:
      - file: hub_report.md
        from_step: load_hub
      - file: health_report.md
        from_step: audit_health
    outputs:
      gap_report.md:
        type: file
        description: "Summary of all gaps found and all issues filed, with URLs"
        required: true
    dependencies:
      - load_hub
      - audit_health
    reviews:
      - run_each: gap_report.md
        additional_review_guidance: "Read health_report.md to verify every gap identified has either an issue filed or an explicit reason it was skipped."
        quality_criteria:
          "All Gaps Addressed": "Every gap from health_report.md and hub_report.md is listed with either an issue URL or a skip reason."
          "Blog Infrastructure Issue": "If a website repo lacks blog/MDX infrastructure, exactly one issue was filed on that repo with a clear description and 'copilot' or 'agent' label."
          "Per-Release Issues": "One issue was filed per missing release post — not a single bulk issue — so each can be assigned and tracked independently."
          "Hub Note Updated": "If hub fields were missing, the hub note was updated with what could be filled in automatically (e.g. repo_ref tags from discovered repos)."

  # ── wrap_up workflow steps ─────────────────────────────────────────────────

  - id: scan_context
    name: "Scan Context and Cluster Changes"
    description: "Discover all uncommitted changes across repos, read shared session state, and cluster changes into logical commit groups"
    instructions_file: steps/scan_context.md
    inputs:
      - name: repos
        description: "Space-separated list of repo paths to scan (e.g. '~/.keystone/repos/ncrmro/keystone'). Leave blank to scan the current working directory."
    outputs:
      wrap_up_scan.json:
        type: file
        description: "Discovered change groups with file lists, suggested commit messages, branch state, and any groups claimed/processed by other sessions from shared state"
        required: true
    dependencies: []
    reviews:
      - run_each: wrap_up_scan.json
        quality_criteria:
          "Groups Identified": "Each logical group of related changes is listed as a separate entry with a file list and suggested commit message."
          "Shared State Read": "The scan checked .deepwork/tmp/wrap_up_state.json and excluded files already processed or claimed by other sessions."
          "Branch Context": "For each repo, the current branch, default branch, and whether it is ahead/behind remote are recorded."

  - id: plan_commits
    name: "Plan Commit Groups"
    description: "Present the next unclaimed change group to the user, confirm the commit message and scope, and record the claim in shared state"
    instructions_file: steps/plan_commits.md
    inputs:
      - file: wrap_up_scan.json
        from_step: scan_context
    outputs:
      wrap_up_plan.json:
        type: file
        description: "The single change group approved for this commit: file list, final commit message, repo path, and session claim written to .deepwork/tmp/wrap_up_state.json"
        required: true
    dependencies:
      - scan_context
    reviews:
      - run_each: wrap_up_plan.json
        additional_review_guidance: "Read wrap_up_scan.json to verify only one group is planned and it does not overlap with groups already processed or claimed by other sessions."
        quality_criteria:
          "Single Group": "Exactly one commit group is described — no unrelated files are bundled together."
          "Conventional Commit Message": "The commit message follows Conventional Commits format: type(scope): subject."
          "Claim Recorded": "The plan notes that this group has been claimed in the shared state file before proceeding."

  - id: commit_and_document
    name: "Commit, Push, and Document"
    description: "Stage and commit the approved group, push, create a ~/notes wrap-up report, post check-in comments on related issues/PRs, and mark the group as processed in shared state"
    instructions_file: steps/commit_and_document.md
    inputs:
      - file: wrap_up_plan.json
        from_step: plan_commits
    outputs:
      wrap_up_progress.json:
        type: file
        description: "Outcome: commit SHA, push status, notes report path, list of issues/PRs commented on, and updated shared state"
        required: true
    dependencies:
      - plan_commits
    reviews:
      - run_each: wrap_up_progress.json
        quality_criteria:
          "Committed and Pushed": "The commit SHA is recorded and the push succeeded (or the reason for failure is explained)."
          "Notes Report Created": "A docs/reports/ note was created in ~/notes with context, status, testing, next steps, and deferred sections."
          "Issues Commented": "Every open issue or PR related to the committed changes received a structured check-in comment."
          "Shared State Updated": "The group is marked as processed in .deepwork/tmp/wrap_up_state.json with the commit SHA."

  - id: continue_or_finish
    name: "Continue or Finish"
    description: "Check remaining unprocessed groups in shared state; ask the user whether to process another group (go_to_step plan_commits) or finish and write a final summary"
    instructions_file: steps/continue_or_finish.md
    inputs:
      - file: wrap_up_progress.json
        from_step: commit_and_document
    outputs:
      wrap_up_summary.md:
        type: file
        description: "Final summary listing all commits made, notes reports created, and issues/PRs commented on during this wrap-up session"
        required: true
    dependencies:
      - commit_and_document
    reviews:
      - run_each: wrap_up_summary.md
        quality_criteria:
          "All Work Listed": "Every commit made during this wrap-up session is listed with its SHA and message."
          "Notes and Issues Referenced": "Every notes report and issue/PR comment produced during this session is referenced."
          "Remaining Changes Noted": "If unprocessed change groups remain, they are listed so the user knows what is still pending."
