# Universal DeepWork Job Library — Full Catalog
# 118 standardized jobs across 17 domains
#
# Schema per job:
#   name: snake_case job name
#   summary: one-line description
#   domain: which domain this belongs to
#   steps: ordered list of all steps in the job
#   reusable_steps: steps marked § (shared across jobs)
#   workflows:
#     <name>:
#       steps: ordered list (nested arrays = concurrent)
#       quality_gates: steps after which a gate fires (🚩)
#
# Query examples:
#   yq '.jobs[] | select(.domain == "software_engineering")' jobs.yaml
#   yq '.jobs[] | select(.reusable_steps[] == "gather_sources")' jobs.yaml
#   yq '.jobs[].workflows | keys' jobs.yaml
#   yq '[.jobs[].reusable_steps[]] | unique | sort' jobs.yaml

# ─── Reusable Step Library ───────────────────────────────────────────
reusable_steps:
  gather_sources:
    occurrences: 20+
    domains: [all_research_intensive]
    description: Collects and validates primary and secondary sources relevant to a given topic
  deep_research:
    occurrences: 10+
    domains: [research, geopolitical, medical, competitive_intel]
    description: In-depth investigation of gathered sources with structured note-taking
  synthesize:
    occurrences: 15+
    domains: [all]
    description: Combines multi-source findings into structured insights with confidence scoring
  write_report:
    occurrences: 40+
    domains: [all]
    description: Generates final deliverable document from synthesized findings
  stakeholder_review:
    occurrences: 30+
    domains: [all]
    description: Routes deliverable to reviewers with structured feedback collection
  compliance_check:
    occurrences: 12+
    domains: [legal, medical, security, finance, aerospace]
    description: Validates outputs against specified regulatory or policy frameworks
  check_citations:
    occurrences: 5+
    domains: [research, medical, education]
    description: Verifies source attribution accuracy and completeness

# ─── Workflow Pattern Templates ──────────────────────────────────────
patterns:
  research_analyze_report:
    template: [gather_sources, analysis_step, synthesize, write_report]
    used_in:
      [
        research,
        market_sizing,
        trend_forecast,
        medical_literature_review,
        intelligence_briefing,
      ]
  audit_gap_remediate:
    template:
      [
        scope_definition,
        inventory,
        evidence_collection,
        gap_analysis,
        risk_scoring,
        remediation_plan,
        write_report,
      ]
    used_in:
      [
        regulatory_compliance_audit,
        site_security_audit,
        seo_audit,
        dependency_audit,
        healthcare_compliance_audit,
      ]
  design_build_review_ship:
    template:
      [
        requirements,
        design,
        [build_a, build_b],
        validation,
        stakeholder_review,
        publish,
      ]
    used_in:
      [
        spec_driven_development,
        api_design,
        cicd_pipeline,
        curriculum_design,
        certification_pathway,
      ]

# ─── Composite Jobs (nest other jobs) ────────────────────────────────
composite_jobs:
  investment_due_diligence:
    [financial_modeling, competitive_landscape, contract_review]
  fundraising_prep: [financial_modeling, board_deck, competitive_landscape]
  strategic_planning: [swot_analysis, okr_kpi_framework, stakeholder_map]
  mission_concept_study:
    [comms_link_budget, radiation_assessment, subsystem_trade_study]
  flight_readiness_review:
    [test_campaign, anomaly_investigation, configuration_management]
  launch_comms: [campaign_planning, content_calendar, email_marketing]
  regulatory_compliance_audit:
    [risk_register, privacy_impact_assessment, policy_drafting]
  business_model_validation:
    [market_sizing, customer_segmentation, competitive_landscape]

