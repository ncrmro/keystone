name: Validate

on:
  pull_request:
  workflow_call:
    inputs:
      force_iso_build:
        description: Force the installer ISO build instead of using PR path filtering.
        required: false
        type: boolean
        default: false
      upload_iso_artifact:
        description: Upload the staged installer ISO as a workflow artifact.
        required: false
        type: boolean
        default: false
      iso_artifact_name:
        description: Artifact name used when uploading the staged installer ISO.
        required: false
        type: string
        default: starter-installer-iso
      iso_file_name:
        description: File name assigned to the staged installer ISO artifact.
        required: false
        type: string
        default: ""
      cache_branch_name:
        description: Branch name used in the internal Nix cache key.
        required: false
        type: string
        default: ""
      save_nix_cache:
        description: Save branch-scoped Nix caches for this invocation.
        required: false
        type: boolean
        default: false
    secrets:
      CACHIX_AUTH_TOKEN:
        required: false
    outputs:
      iso_built:
        description: Whether the installer ISO was built.
        value: ${{ jobs.iso-build.outputs.iso_built }}
      iso_artifact_name:
        description: Artifact name for the staged installer ISO.
        value: ${{ jobs.iso-build.outputs.iso_artifact_name }}
      iso_file_name:
        description: File name of the staged installer ISO.
        value: ${{ jobs.iso-build.outputs.iso_file_name }}

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed so pull requests can skip the expensive ISO build,
  # while workflow callers can force it for cache warming or release publishing.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_build_iso: ${{ steps.pr-policy.outputs.should_build_iso || steps.call-policy.outputs.should_build_iso || 'false' }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'

      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            iso_build:
              - '.github/workflows/validate.yml'
              - '.github/workflows/release.yml'
              - 'bin/generate-template-fixture'
              - 'flake.lock'
              - 'flake.nix'
              - 'lib/templates.nix'
              - 'modules/**'
              - 'packages/**'
              - 'templates/default/**'

      - name: Use pull request ISO policy
        if: github.event_name == 'pull_request'
        id: pr-policy
        run: |
          echo "should_build_iso=${{ steps.filter.outputs.iso_build }}" >> "$GITHUB_OUTPUT"

      - name: Use workflow-call ISO policy
        if: github.event_name == 'workflow_call'
        id: call-policy
        run: |
          echo "should_build_iso=${{ inputs.force_iso_build }}" >> "$GITHUB_OUTPUT"

  flake-check:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Restore and save internal Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.head_ref || github.ref_name }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.head_ref || github.ref_name }}-${{ github.job }}-
          restore-prefixes-all-matches: |
            nix-${{ runner.os }}-${{ github.event.repository.default_branch }}-${{ github.job }}-
          gc-max-store-size-linux: 3G
          save: ${{ github.event_name == 'workflow_call' && inputs.save_nix_cache || false }}
      - name: Configure Cachix
        if: env.CACHIX_AUTH_TOKEN == ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
      - name: Configure Cachix (auth)
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
      - name: Check flake
        run: nix flake check

  nixfmt:
    name: nixfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Check Nix formatting
        run: |
          nix shell --inputs-from . .#formatter.x86_64-linux nixpkgs#findutils -c sh -lc '
            find flake.nix modules packages tests bin conventions docs specs \
              -name "*.nix" -print0 \
              | xargs -0 --no-run-if-empty nixfmt --check
          '

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run shellcheck
        run: |
          nix shell --inputs-from . nixpkgs#findutils nixpkgs#shellcheck -c sh -lc '
            find bin modules packages tests .deepwork \
              \( -path "modules/terminal/claude-code/update.sh" -o -path "modules/terminal/scripts/keystone-sync-agent-assets.sh" \) -prune \
              -o \( -name "*.sh" -o -name "*.bash" \) -print0 \
              | xargs -0 --no-run-if-empty shellcheck -S error
          '

  ks-cli:
    name: ks-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt,clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: packages/ks/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Check formatting
        run: cargo fmt --all --manifest-path packages/ks/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --manifest-path packages/ks/Cargo.toml -- -D warnings

      - name: Build
        run: cargo build --manifest-path packages/ks/Cargo.toml --verbose

      - name: Run tests
        run: cargo test --manifest-path packages/ks/Cargo.toml --verbose

  # Build the real ISO from a generated template fixture when
  # installer or template surfaces change, or when a workflow caller
  # explicitly forces the build for cache warming or publishing.
  iso-build:
    name: iso-build
    needs: changes
    if: needs.changes.outputs.should_build_iso == 'true'
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    outputs:
      iso_built: ${{ steps.collect-iso.outputs.iso_built }}
      iso_artifact_name: ${{ steps.artifact-meta-pr.outputs.iso_artifact_name || steps.artifact-meta-call.outputs.iso_artifact_name || 'starter-installer-iso' }}
      iso_file_name: ${{ steps.collect-iso.outputs.iso_file_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Restore and save internal Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.head_ref || github.ref_name }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.head_ref || github.ref_name }}-${{ github.job }}-
          restore-prefixes-all-matches: |
            nix-${{ runner.os }}-${{ github.event.repository.default_branch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          save: ${{ github.event_name == 'workflow_call' && inputs.save_nix_cache || false }}

      - name: Configure Cachix
        if: env.CACHIX_AUTH_TOKEN == ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems

      - name: Configure Cachix (auth)
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Set pull request ISO metadata
        if: github.event_name == 'pull_request'
        id: artifact-meta-pr
        run: |
          echo "iso_artifact_name=starter-installer-iso" >> "$GITHUB_OUTPUT"

      - name: Set workflow-call ISO metadata
        if: github.event_name == 'workflow_call'
        id: artifact-meta-call
        run: |
          echo "iso_artifact_name=${{ inputs.iso_artifact_name }}" >> "$GITHUB_OUTPUT"
          echo "iso_file_name=${{ inputs.iso_file_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate ISO template fixture
        run: |
          FIXTURE_DIR="$RUNNER_TEMP/keystone-starter-fixture"
          ./bin/generate-template-fixture --output "$FIXTURE_DIR"
          echo "FIXTURE_DIR=$FIXTURE_DIR" >> "$GITHUB_ENV"

      - name: Verify generated fixture user
        run: |
          grep -n 'username = "keystone";' "$FIXTURE_DIR/flake.nix"

      - name: Build ISO from generated fixture
        id: collect-iso
        env:
          REQUESTED_ISO_FILE_NAME: ${{ steps.artifact-meta-call.outputs.iso_file_name }}
        run: |
          set -euo pipefail

          cd "$FIXTURE_DIR"
          ./bin/test-iso --build-only

          iso_path="$(find "$FIXTURE_DIR/.test-iso/iso" -maxdepth 1 -name '*.iso' -print -quit)"
          if [[ -z "$iso_path" ]]; then
            echo "Generated fixture build completed but no ISO artifact was found"
            exit 1
          fi

          iso_file_name="${REQUESTED_ISO_FILE_NAME:-$(basename "$iso_path")}"
          artifact_dir="$RUNNER_TEMP/starter-iso-artifact"
          mkdir -p "$artifact_dir"
          cp "$iso_path" "$artifact_dir/$iso_file_name"

          {
            echo "iso_artifact_path=$artifact_dir/$iso_file_name"
            echo "iso_file_name=$iso_file_name"
            echo "iso_built=true"
          } >> "$GITHUB_OUTPUT"

      - name: Upload starter ISO artifact
        if: github.event_name == 'workflow_call' && inputs.upload_iso_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-meta-call.outputs.iso_artifact_name }}
          path: ${{ steps.collect-iso.outputs.iso_artifact_path }}
          if-no-files-found: error
