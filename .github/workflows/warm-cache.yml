name: Warm Cache

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache_branch_name:
        description: Branch name used in the internal Nix cache key.
        required: false
        type: string
        default: ""
      save_nix_cache:
        description: Save branch-scoped Nix caches for this invocation.
        required: false
        type: boolean
        default: false
    secrets:
      CACHIX_AUTH_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: warm-cache-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  warm-cache:
    runs-on: ubuntu-latest-8-cores
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Restore and save internal Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.ref_name }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.ref_name }}-${{ github.job }}-
          restore-prefixes-all-matches: |
            nix-${{ runner.os }}-${{ github.event.repository.default_branch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          save: ${{ github.event_name == 'workflow_call' && inputs.save_nix_cache || false }}

      - name: Configure Cachix
        if: env.CACHIX_AUTH_TOKEN == ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems

      - name: Configure Cachix (auth)
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Warm generated-template host closures
        run: |
          set -euo pipefail

          FIXTURE_DIR="$RUNNER_TEMP/keystone-starter-fixture"
          ./bin/generate-template-fixture --output "$FIXTURE_DIR"

          # Warm the same NixOS host closures that `nixos-install` later realizes
          # from the generated starter template. Warming only keystone package
          # attrs is not enough for installer performance, because the installed
          # host closure also includes Home Manager, desktop, service, and AI
          # tool outputs from the consumer flake.
          mapfile -t installer_targets < <(
            nix eval \
              --apply 'targets: builtins.concatStringsSep "\n" (builtins.attrNames targets)' \
              --raw \
              "$FIXTURE_DIR#installerTargets"
          )

          if [[ "${#installer_targets[@]}" -eq 0 ]]; then
            echo "Generated fixture did not expose any installer targets"
            exit 1
          fi

          target_attrs=()
          for target in "${installer_targets[@]}"; do
            target_attrs+=("$FIXTURE_DIR#nixosConfigurations.${target}.config.system.build.toplevel")
          done

          nix build "${target_attrs[@]}" --print-build-logs

      - name: Warm curated package cache
        run: |
          set -euo pipefail

          nix build \
            .#packages.x86_64-linux.agent-coding-agent \
            .#packages.x86_64-linux.agent-mail \
            .#packages.x86_64-linux.chrome-devtools-mcp \
            .#packages.x86_64-linux.deepwork-library-jobs \
            .#packages.x86_64-linux.fetch-email-source \
            .#packages.x86_64-linux.fetch-forgejo-sources \
            .#packages.x86_64-linux.fetch-github-sources \
            .#packages.x86_64-linux.forgejo-cli-ex \
            .#packages.x86_64-linux.forgejo-project \
            .#packages.x86_64-linux.grafana-mcp \
            .#packages.x86_64-linux.keystone-conventions \
            .#packages.x86_64-linux.keystone-deepwork-jobs \
            .#packages.x86_64-linux.ks \
            .#packages.x86_64-linux.lfs-s3 \
            .#packages.x86_64-linux.podman-agent \
            .#packages.x86_64-linux.pz \
            .#packages.x86_64-linux.repo-sync \
            .#packages.x86_64-linux.slidev \
            .#packages.x86_64-linux.zellij-tab-name \
            .#packages.x86_64-linux.zesh
