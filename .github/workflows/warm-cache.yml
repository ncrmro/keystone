name: Warm Cache

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache_branch_name:
        description: Branch name used in the internal Nix cache key.
        required: false
        type: string
        default: ""
      save_nix_cache:
        description: Save branch-scoped Nix caches for this invocation.
        required: false
        type: boolean
        default: false
    secrets:
      CACHIX_CI_AUTH_TOKEN:
        required: false
      CACHIX_AUTH_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: warm-cache-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    # Scoped to the release environment so secrets.CACHIX_AUTH_TOKEN
    # (held there) is injected. Branch policies on the environment allow
    # both 'main' (release pushes) and 'ci/installer-cache-warm-validation'
    # (the PR validate caller) to run this job.
    environment: release
    env:
      CACHIX_CI_AUTH_TOKEN: ${{ secrets.CACHIX_CI_AUTH_TOKEN }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Restore and save internal Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.ref_name }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ github.event_name == 'workflow_call' && inputs.cache_branch_name || github.ref_name }}-${{ github.job }}-
          restore-prefixes-all-matches: |
            nix-${{ runner.os }}-${{ github.event.repository.default_branch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          save: ${{ github.event_name == 'workflow_call' && inputs.save_nix_cache || false }}

      # Push to ks-systems (production cache — what every Keystone user pulls from).
      # Falls back to read-only when CACHIX_AUTH_TOKEN isn't injected (e.g. PR validate
      # callers that don't run under the release environment).
      - name: Configure Cachix (ks-systems)
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      # Push to ks-ci (CI-only cache, isolated from production)
      - name: Configure Cachix (ks-ci)
        if: env.CACHIX_CI_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v15
        with:
          name: ks-ci
          authToken: ${{ env.CACHIX_CI_AUTH_TOKEN }}

      - name: Warm cache
        run: |
          ./bin/warm-cachix --fixture-dir "$RUNNER_TEMP/keystone-starter-fixture"
