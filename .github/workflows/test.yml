name: Test

on:
  pull_request:

jobs:
  # Detect which files changed to conditionally run expensive jobs
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      iso_build: ${{ steps.filter.outputs.iso_build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iso_build:
              - '.github/workflows/test.yml'
              - '.github/workflows/release.yml'
              - 'bin/generate-template-fixture'
              - 'flake.lock'
              - 'flake.nix'
              - 'lib/templates.nix'
              - 'modules/**'
              - 'packages/**'
              - 'templates/default/**'

  # Basic flake validation - always runs
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
      - name: Check flake
        run: nix flake check

  # Build the real ISO from a generated template fixture when
  # installer or template surfaces change.
  iso-build:
    name: iso-build
    needs: changes
    if: needs.changes.outputs.iso_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems

      - name: Generate ISO template fixture
        run: |
          FIXTURE_DIR="$RUNNER_TEMP/keystone-starter-fixture"
          ./bin/generate-template-fixture --output "$FIXTURE_DIR"
          echo "FIXTURE_DIR=$FIXTURE_DIR" >> "$GITHUB_ENV"

      - name: Verify generated fixture user
        run: |
          grep -n 'username = "keystone";' "$FIXTURE_DIR/flake.nix"

      - name: Build ISO from generated fixture
        run: |
          cd "$FIXTURE_DIR"
          ./bin/test-iso --build-only
