name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.9.0"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    env:
      VERSION: ${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release request
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "The Release workflow must run from the default branch ${DEFAULT_BRANCH}"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must match MAJOR.MINOR.PATCH"
            exit 1
          fi

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            exit 1
          fi

          echo "RELEASE_SERIES=${VERSION%.*}" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH=release/${VERSION%.*}" >> "$GITHUB_ENV"

      - name: Create or reuse release branch
        run: |
          set -euo pipefail

          git fetch --prune origin

          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "Using existing release branch $RELEASE_BRANCH"
            git fetch origin "$RELEASE_BRANCH":"refs/remotes/origin/$RELEASE_BRANCH"
            git checkout --track "origin/$RELEASE_BRANCH"
          else
            echo "Creating release branch $RELEASE_BRANCH from origin/$DEFAULT_BRANCH"
            git fetch origin "$DEFAULT_BRANCH":"refs/remotes/origin/$DEFAULT_BRANCH"
            git checkout -b "$RELEASE_BRANCH" "origin/$DEFAULT_BRANCH"
            git push origin "HEAD:refs/heads/$RELEASE_BRANCH"
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ks-systems
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build stage
        run: |
          set -euo pipefail
          nix build .#packages.x86_64-linux.keystone-tui
          nix build .#iso --dry-run

      - name: Test stage
        run: |
          set -euo pipefail
          nix flake check

      - name: Tag stage
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "refs/tags/v$VERSION"

      - name: Publish stage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "v$VERSION" \
            --verify-tag \
            --generate-notes \
            --title "Keystone v$VERSION" \
            --target "$RELEASE_BRANCH"
